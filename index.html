<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Velora Ultra v50.0 - Rafael Digital Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>

    <style>
        :root { 
            --b: #4da3ff; --bg: #0a0c10; --c: #161b22; --t: #e6edf3; 
            --g: #8b949e; --r: #ff4d4d; --gold: #f1c40f; --green: #2ea043;
            --p: #a371f7; --glass: rgba(255, 255, 255, 0.05);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--t); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100dvh; overflow: hidden; user-select: none;
        }

        /* Login Screen (Matching Screenshot) */
        .auth-screen { 
            position: fixed; inset: 0; z-index: 10000; background: #0a0c10;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .v-logo { font-size: 85px; font-weight: 900; color: var(--b); letter-spacing: -5px; margin-bottom: 5px; text-shadow: 0 0 30px rgba(77, 163, 255, 0.3); }
        .v-sub { font-size: 13px; color: var(--g); letter-spacing: 3px; margin-bottom: 80px; font-weight: 400; opacity: 0.8; }
        
        .g-btn { 
            background: #fff; color: #000; border: none; padding: 18px 35px; border-radius: 50px; 
            font-size: 19px; font-weight: 700; cursor: pointer; display: flex; align-items: center; 
            gap: 15px; width: 100%; max-width: 320px; justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .g-btn:active { transform: scale(0.92); }
        .g-btn svg { width: 24px; height: 24px; }
        
        .raf-foot { margin-top: 80px; color: var(--b); text-decoration: none; font-size: 15px; font-weight: 500; }

        /* App Layout */
        #app { display: none; height: 100%; flex-direction: column; }
        header { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid #333; z-index: 100;
        }
        
        /* Stories System */
        .story-bar { 
            display: flex; gap: 15px; padding: 15px 20px; overflow-x: auto; 
            background: #010409; border-bottom: 1px solid #222; scrollbar-width: none;
        }
        .story-bar::-webkit-scrollbar { display: none; }
        .s-circle { 
            min-width: 68px; height: 68px; border-radius: 50%; border: 3px solid var(--b); 
            padding: 3px; position: relative; cursor: pointer; transition: 0.3s;
        }
        .s-circle.seen { border-color: #333; }
        .s-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .s-add { 
            min-width: 68px; height: 68px; border-radius: 50%; border: 2px dashed #444;
            display: flex; align-items: center; justify-content: center; font-size: 28px; color: #666;
        }

        /* Chat List */
        .chat-list { flex: 1; overflow-y: auto; background: #010409; }
        .chat-row { 
            display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid #161b22;
            cursor: pointer; transition: 0.2s;
        }
        .chat-row:active { background: #1c2128; }
        .chat-av { 
            width: 58px; height: 58px; border-radius: 50%; background: var(--c); margin-left: 15px;
            display: flex; align-items: center; justify-content: center; font-weight: 700; position: relative;
        }
        .online-tag { 
            width: 14px; height: 14px; border-radius: 50%; background: var(--green); 
            position: absolute; bottom: 2px; right: 2px; border: 3px solid #010409; 
        }

        /* Navigation */
        .bottom-nav { 
            height: 80px; background: var(--c); display: flex; border-top: 1px solid #333;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-tab { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; color: var(--g); font-size: 11px; gap: 5px;
        }
        .nav-tab.active { color: var(--b); font-weight: bold; }
        .nav-tab i { font-size: 24px; }

        /* Full Modals (Chat, Admin, Settings) */
        .modal { 
            position: fixed; inset: 0; background: var(--bg); z-index: 500; 
            transform: translateY(100%); transition: 0.45s cubic-bezier(0.1, 0.7, 0.1, 1);
            display: flex; flex-direction: column;
        }
        .modal.active { transform: translateY(0); }
        .modal-header { padding: 15px 20px; display: flex; align-items: center; background: var(--c); gap: 15px; }

        /* Admin UI */
        .admin-zone { padding: 25px; }
        .admin-card { background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .input-dark { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #444; 
            background: #000; color: #fff; font-size: 16px; margin: 10px 0;
        }
        .p-btn { background: var(--b); color: #000; font-weight: bold; border: none; padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-box" class="auth-screen">
        <div class="v-logo">VELORA</div>
        <div class="v-sub">RAFAEL DIGITAL PLATFORM</div>
        
        <button class="g-btn" onclick="secureLogin()">
            <span id="txt-login">כניסה עם Google</span>
            <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        </button>

        <a href="https://did.li/Rafael-Digital-office" class="raf-foot">נוצר על ידי רפאל דיגיטל</a>
    </div>

    <div id="app">
        <header>
            <div style="display:flex; align-items:center; gap:12px;">
                <div id="my-photo" style="width:38px; height:38px; border-radius:50%; border:2px solid var(--b); overflow:hidden; background:#222;"></div>
                <h3 id="my-name-display" style="font-size:18px; letter-spacing:-0.5px;">Velora</h3>
            </div>
            <div style="display:flex; gap:18px; align-items:center;">
                <span id="admin-icon" onclick="openAdmin()" style="display:none; cursor:pointer; font-size:20px;">🛡️</span>
                <span id="gold-crown" style="display:none; color:var(--gold); font-size:22px;">👑</span>
                <span onclick="syncContacts()" style="cursor:pointer; font-size:20px;">👥</span>
            </div>
        </header>

        <div class="story-bar" id="story-container">
            <div class="s-add" onclick="uploadStory()">+</div>
        </div>

        <div class="chat-list" id="chat-engine-view"></div>

        <nav class="bottom-nav">
            <div class="nav-tab active"><i>💬</i><span>שיחות</span></div>
            <div class="nav-tab" onclick="tab('status')"><i>⭕</i><span>סטטוס</span></div>
            <div class="nav-tab" onclick="logout()"><i>🚪</i><span>יציאה</span></div>
        </nav>
    </div>

    <div id="admin-modal" class="modal">
        <div class="modal-header">
            <span onclick="closeAdmin()" style="font-size:24px; cursor:pointer;">⬅️</span>
            <h2>מרכז ניהול רפאל</h2>
        </div>
        <div class="admin-zone">
            <div class="admin-card">
                <h3>התראת מערכת גלובלית</h3>
                <p style="font-size:12px; color:var(--g); margin:5px 0;">יישלח לכל המשתמשים באפליקציה</p>
                <input type="text" id="global-msg" class="input-dark" placeholder="הקלד הודעת מנהל...">
                <button class="p-btn" onclick="broadcast()">שלח התראה לכולם</button>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG - MUST BE UPDATED BY RAFAEL
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER",
            appId: "YOUR_APP"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();

        // Security Fix: Persistence
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

        function secureLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.addScope('https://www.googleapis.com/auth/contacts.readonly');
            
            auth.signInWithPopup(provider).then(res => {
                sessionStorage.setItem('token', res.credential.accessToken);
                launch(res.user);
            }).catch(e => {
                console.error(e);
                alert("שגיאה קריטית בכניסה. נסה שוב.");
            });
        }

        function launch(user) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('my-photo').innerHTML = `<img src="${user.photoURL}" width="100%">`;
            document.getElementById('my-name-display').innerText = user.displayName;

            // Admin Elevation
            if (user.email === 'rplzky7@gmail.com') {
                document.getElementById('admin-icon').style.display = 'block';
                document.getElementById('gold-crown').style.display = 'block';
            }

            loadData();
            Notification.requestPermission();
        }

        function loadData() {
            // Realtime Sync
            db.ref('chats').on('value', snap => {
                const data = snap.val();
                renderChats(data || []);
            });
        }

        function renderChats(data) {
            const list = document.getElementById('chat-engine-view');
            list.innerHTML = `
                <div class="chat-row" onclick="alert('בפיתוח...')">
                    <div class="chat-av">י<div class="online-tag"></div></div>
                    <div style="flex:1"><b>יהודה</b><br><small style="color:var(--g)">היי, שלחת לי את הקוד?</small></div>
                    <div style="font-size:10px; color:var(--g);">09:22</div>
                </div>
            `;
        }

        async function syncContacts() {
            const token = sessionStorage.getItem('token');
            if(!token) return;
            try {
                const res = await fetch('https://people.googleapis.com/v1/people/me/connections?personFields=names,photos', {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                const d = await res.json();
                alert(`סונכרנו ${d.connections ? d.connections.length : 0} אנשי קשר מגוגל!`);
            } catch(e) { alert("סנכרון נכשל."); }
        }

        function openAdmin() { document.getElementById('admin-modal').classList.add('active'); }
        function closeAdmin() { document.getElementById('admin-modal').classList.remove('active'); }
        
        function broadcast() {
            const m = document.getElementById('global-msg').value;
            if(!m) return;
            db.ref('alerts').push({ msg: m, time: Date.now() });
            alert("ההודעה נשלחה בהצלחה!");
            document.getElementById('global-msg').value = '';
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        // Watchdog: Auto-Login
        auth.onAuthStateChanged(u => { if(u) launch(u); });

        // Service Worker for Install (PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(e=>null));
        }

        window.oncontextmenu = e => e.preventDefault();
    </script>
</body>
</html>
