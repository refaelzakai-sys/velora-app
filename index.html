<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Velora Ultra v25.0</title>
    <style>
        :root { --b: #4da3ff; --bg: #0a0c10; --c: #161b22; --t: #e6edf3; --g: #8b949e; --r: #ff4d4d; --p: #a371f7; --gold: #f1c40f; --green: #2ea043; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--t); height: 100dvh; overflow: hidden; user-select: none; }
        .app { display: flex; flex-direction: column; height: 100%; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #0d1117; border-bottom: 1px solid #333; }
        .main { flex: 1; overflow-y: auto; background: #010409; padding-bottom: 80px; }
        .chat-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222; cursor: pointer; }
        .av { width: 50px; height: 50px; border-radius: 50%; background: var(--c); margin-left: 12px; display: flex; align-items: center; justify-content: center; border: 1px solid #444; font-size: 18px; position: relative; }
        .nav { height: 75px; background: var(--c); display: flex; border-top: 1px solid #333; padding-bottom: env(safe-area-inset-bottom); }
        .nav-i { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--g); font-size: 11px; cursor: pointer; }
        .nav-i.active { color: var(--b); }
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; transform: translateY(100%); transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); display: flex; flex-direction: column; }
        .modal.open { transform: translateY(0); }
        
        /* ממשק שיחה */
        .call-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: space-around; padding: 40px 20px; }
        .call-screen.active { display: flex; }
        .video-container { position: absolute; inset: 0; background: #111; z-index: -1; }
        .call-info { text-align: center; }
        .call-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; max-width: 320px; }
        .c-btn { width: 65px; height: 65px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .c-btn.off { background: var(--r); }
        .c-btn.hangup { background: var(--r); grid-column: 2; width: 75px; height: 75px; font-size: 30px; }
        
        .bubble { background: #21262d; padding: 12px; border-radius: 15px; margin-bottom: 10px; max-width: 85%; align-self: flex-start; }
        .btn { background: var(--b); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin: 10px 0; }
        .msg-box { background: var(--c); padding: 15px; display: flex; gap: 12px; align-items: center; border-top: 1px solid #333; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--green); position: absolute; bottom: 0; right: 0; border: 2px solid var(--bg); }
    </style>
</head>
<body>

    <div id="auth" style="height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:30px; text-align:center;">
        <h1 style="color:var(--b); font-size:60px; margin:0;">Velora</h1>
        <p style="color:var(--g)">Digital Infrastructure by Rafael</p>
        <input type="email" id="mail" placeholder="הכנס אימייל" style="width:100%; max-width:300px; padding:15px; border-radius:12px; border:1px solid #333; background:var(--c); color:white; text-align:center; margin-top:30px;">
        <button class="btn" style="max-width:300px;" onclick="login()">כניסה למערכת</button>
    </div>

    <div id="app" class="app" style="display:none;">
        <header>
            <h2 style="margin:0;">Velora</h2>
            <div style="display:flex; gap:15px; align-items:center;">
                <span onclick="toggleLock()" style="cursor:pointer; font-size:24px;">🔒</span>
                <span id="crown" style="display:none; color:var(--gold); font-size:26px;" onclick="alert('ניהול רפאל פעיל')">👑</span>
            </div>
        </header>
        <main class="main" id="view-area"></main>
        <nav class="nav">
            <div class="nav-i active" onclick="setTab('chats')"><span>💬</span>שיחות</div>
            <div class="nav-i" onclick="setTab('groups')"><span>👥</span>קבוצות</div>
            <div class="nav-i" onclick="setTab('me')"><span>👤</span>פרופיל</div>
        </nav>
    </div>

    <div id="chat-page" class="modal">
        <header>
            <span onclick="closeAll()" style="cursor:pointer; font-size:24px;">✕</span>
            <h3 id="chat-title" style="margin:0;">שיחה</h3>
            <div style="display:flex; gap:15px;">
                <span id="v-call-btn" onclick="startCall('video')" style="cursor:pointer;">📹</span>
                <span id="a-call-btn" onclick="startCall('audio')" style="cursor:pointer;">📞</span>
            </div>
        </header>
        <div id="messages-flow" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column;"></div>
        <div class="msg-box">
            <input type="text" id="text-msg" placeholder="הודעה..." style="flex:1; background:none; border:none; color:white; font-size:16px;">
            <span onclick="sendMsg()" style="color:var(--b); font-weight:bold; cursor:pointer;">שלח</span>
        </div>
    </div>

    <div id="call-screen" class="call-screen">
        <div class="video-container" id="vid-bg"></div>
        <div class="call-info">
            <div class="av" style="width:100px; height:100px; font-size:40px; margin:0 auto 20px;" id="call-av">R</div>
            <h2 id="call-name" style="margin:0;">רפאל</h2>
            <p id="call-status" style="color:var(--g)">שיחה בחיבור...</p>
        </div>
        <div class="call-controls">
            <button class="c-btn" id="btn-mic" onclick="toggleCallBtn('mic')">🎙️</button>
            <button class="c-btn" id="btn-cam" onclick="toggleCallBtn('cam')">📷</button>
            <button class="c-btn" id="btn-spk" onclick="toggleCallBtn('spk')">🔊</button>
            <button class="c-btn hangup" onclick="endCall()">📞</button>
        </div>
    </div>

    <script>
        let state = { user: null, isLocked: true, tab: 'chats', chats: [], call: { active: false, type: 'audio', mic: true, cam: true, spk: true } };
        const $ = id => document.getElementById(id);

        function login() {
            const e = $('mail').value; if(!e.includes('@')) return;
            state.user = { email: e, isAdmin: e === 'rplzky7@gmail.com' };
            $('auth').style.display = 'none'; $('app').style.display = 'flex';
            if(state.user.isAdmin) $('crown').style.display = 'block';
            load(); render();
        }

        function load() {
            state.chats = [
                {n: 'יהודה', t: 'chat', h: false, msgs: []},
                {n: 'קבוצת פיתוח', t: 'group', h: false, msgs: [], members: 12, admin: 'rplzky7@gmail.com'}
            ];
        }

        function render() {
            const v = $('view-area');
            const list = state.chats.filter(c => state.tab === 'groups' ? (c.t !== 'chat') : (state.isLocked ? !c.h : c.h));
            v.innerHTML = list.map((c, i) => `
                <div class="chat-item" onclick="openChat(${state.chats.indexOf(c)})">
                    <div class="av">${c.n[0]} ${c.t === 'group' ? '<div class="status-dot"></div>' : ''}</div>
                    <div style="flex:1"><b>${c.n}</b><br><small style="color:var(--g)">${c.t === 'group' ? c.members + ' משתתפים' : 'מחובר'}</small></div>
                </div>
            `).join('');
        }

        let activeIdx = -1;
        function openChat(i) {
            activeIdx = i; const c = state.chats[i];
            $('chat-title').innerText = c.n;
            $('v-call-btn').style.display = c.t === 'chat' ? 'block' : 'none';
            $('a-call-btn').innerText = c.t === 'group' ? '🔊 הצטרף' : '📞';
            $('chat-page').classList.add('open');
        }

        function startCall(type) {
            state.call = { active: true, type, mic: true, cam: type === 'video', spk: true };
            $('call-name').innerText = state.chats[activeIdx].n;
            $('call-av').innerText = state.chats[activeIdx].n[0];
            $('call-status').innerText = type === 'video' ? 'שיחת וידאו...' : 'שיחה קולית...';
            $('btn-cam').style.opacity = type === 'video' ? '1' : '0.2';
            $('call-screen').classList.add('active');
        }

        function toggleCallBtn(btn) {
            state.call[btn] = !state.call[btn];
            const el = $('btn-' + btn);
            el.classList.toggle('off', !state.call[btn]);
            if(btn === 'mic') el.innerText = state.call.mic ? '🎙️' : '🔇';
            if(btn === 'cam') el.innerText = state.call.cam ? '📷' : '🚫';
            if(btn === 'spk') el.innerText = state.call.spk ? '🔊' : '🔈';
        }

        function endCall() {
            state.call.active = false;
            $('call-screen').classList.remove('active');
            alert("השיחה נותקה.");
        }

        function setTab(t) { state.tab = t; render(); }
        function closeAll() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); }
        function toggleLock() { state.isLocked = !state.isLocked; render(); }
        
        window.oncontextmenu = e => e.preventDefault();
    </script>
</body>
</html>
