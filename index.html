<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Velora Ultra - Complete Professional Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>

    <style>
        /* CSS מורחב ומקצועי */
        :root { 
            --b: #4da3ff; --bg: #0a0c10; --c: #161b22; --t: #e6edf3; 
            --g: #8b949e; --r: #ff4d4d; --gold: #f1c40f; --green: #2ea043;
            --p: #a371f7; --overlay: rgba(0,0,0,0.85); --glass: rgba(255,255,255,0.03);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { 
            background: var(--bg); color: var(--t); font-family: -apple-system, system-ui, sans-serif;
            height: 100dvh; overflow: hidden; overscroll-behavior: none;
        }

        /* מסך כניסה - עיצוב Rafael Digital */
        #auth-screen { 
            position: fixed; inset: 0; z-index: 10000; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px;
            background-image: radial-gradient(circle at top right, #1c2128 0%, #0a0c10 100%);
        }
        .v-logo { font-size: 85px; font-weight: 900; color: var(--b); letter-spacing: -5px; margin-bottom: 5px; }
        .v-sub { font-size: 13px; color: var(--g); letter-spacing: 3px; margin-bottom: 80px; text-transform: uppercase; }
        
        .login-card { 
            background: white; color: black; border: none; padding: 20px 40px; border-radius: 60px; 
            font-size: 19px; font-weight: 800; cursor: pointer; display: flex; align-items: center; 
            gap: 15px; width: 100%; max-width: 340px; justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); transition: 0.4s cubic-bezier(0.2, 1, 0.2, 1);
        }
        .login-card:active { transform: scale(0.94); }
        .rafael-btn-link { margin-top: 60px; color: var(--b); text-decoration: none; font-weight: 500; font-size: 16px; border-bottom: 1px solid transparent; transition: 0.3s; }
        .rafael-btn-link:hover { border-bottom-color: var(--b); }

        /* מבנה האפליקציה המלא */
        #main-app { display: none; height: 100%; flex-direction: column; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: #0d1117; border-bottom: 1px solid #30363d;
        }
        .user-pill { display: flex; align-items: center; gap: 10px; background: var(--glass); padding: 5px 12px; border-radius: 30px; border: 1px solid #444; }
        .avatar-circle { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; background: #222; }

        /* סרגל סטטוסים - Realtime Stories */
        .stories-container { 
            display: flex; gap: 15px; padding: 15px 20px; overflow-x: auto; 
            background: #010409; border-bottom: 1px solid #21262d; scrollbar-width: none;
        }
        .stories-container::-webkit-scrollbar { display: none; }
        .story-item { 
            min-width: 68px; height: 68px; border-radius: 50%; border: 3px solid var(--b); 
            padding: 3px; position: relative; cursor: pointer;
        }
        .story-item.seen { border-color: #30363d; }
        .story-item img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .add-story-btn { 
            min-width: 68px; height: 68px; border-radius: 50%; border: 2px dashed #484f58;
            display: flex; align-items: center; justify-content: center; font-size: 30px; color: #8b949e;
        }

        /* רשימת צ'אטים */
        .chat-list { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .chat-entry { 
            display: flex; align-items: center; padding: 18px 20px; border-bottom: 1px solid #161b22;
            cursor: pointer; position: relative;
        }
        .chat-entry:active { background: #1c2128; }
        .chat-info { flex: 1; margin-right: 15px; }
        .chat-info h4 { font-size: 16px; margin-bottom: 4px; }
        .chat-info p { font-size: 13px; color: var(--g); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ניווט תחתון */
        .nav-dock { 
            height: 80px; background: #161b22; display: flex; border-top: 1px solid #30363d;
            position: fixed; bottom: 0; width: 100%; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--g); font-size: 11px; transition: 0.2s; }
        .nav-btn.active { color: var(--b); font-weight: 700; }
        .nav-btn svg { width: 26px; height: 26px; margin-bottom: 4px; }

        /* פאנל ניהול אקסטרים */
        .admin-modal { 
            position: fixed; inset: 0; background: var(--bg); z-index: 9999; 
            transform: translateX(100%); transition: 0.5s cubic-bezier(0.1, 0.7, 0.1, 1);
            display: flex; flex-direction: column;
        }
        .admin-modal.open { transform: translateX(0); }
        .admin-section { padding: 25px; }
        .admin-box { background: var(--glass); border: 1px solid #333; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        
        /* מערכת הודעות */
        #chat-window { position: fixed; inset: 0; background: var(--bg); z-index: 800; display: none; flex-direction: column; }
        #message-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: var(--bg); }
        .bubble { padding: 12px 18px; border-radius: 22px; max-width: 80%; font-size: 15px; line-height: 1.4; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .bubble.me { align-self: flex-end; background: var(--b); color: #000; border-bottom-right-radius: 4px; }
        .bubble.them { align-self: flex-start; background: #21262d; border-bottom-left-radius: 4px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="v-logo">VELORA</div>
        <div class="v-sub">RAFAEL DIGITAL PLATFORM</div>
        
        <button class="login-card" onclick="startGoogleAuth()">
            <span id="login-text">כניסה עם Google</span>
            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        </button>

        <a href="https://did.li/Rafael-Digital-office" class="rafael-btn-link">Powered by Rafael Digital</a>
    </div>

    <div id="main-app">
        <header>
            <div class="user-pill">
                <div id="u-photo" class="avatar-circle"></div>
                <span id="u-name" style="font-weight: 600;">Velora</span>
            </div>
            <div style="display:flex; gap:18px; align-items:center;">
                <span id="adm-trigger" onclick="toggleAdmin(true)" style="display:none; cursor:pointer; font-size:22px;">🛡️</span>
                <span id="crown-icon" style="display:none; color:var(--gold); font-size:24px;">👑</span>
                <span onclick="syncPeople()" style="cursor:pointer; font-size:22px;">👥</span>
            </div>
        </header>

        <div class="stories-container" id="story-list">
            <div class="add-story-btn" onclick="triggerStatusUpload()">+</div>
        </div>

        <main class="chat-list" id="chats-view"></main>

        <nav class="nav-dock">
            <div class="nav-btn active">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                <span>שיחות</span>
            </div>
            <div class="nav-btn" onclick="alert('סטטוסים בקרוב')">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                <span>סטטוס</span>
            </div>
            <div class="nav-btn" onclick="doLogout()">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
                <span>יציאה</span>
            </div>
        </nav>
    </div>

    <div id="admin-panel" class="admin-modal">
        <header>
            <span onclick="toggleAdmin(false)" style="font-size:28px; cursor:pointer;">⬅️</span>
            <h2 style="flex:1; text-align:center;">Rafael Digital Admin</h2>
        </header>
        <div class="admin-section">
            <div class="admin-box">
                <h3 style="color:var(--b);">📢 התראה גלובלית</h3>
                <p style="color:var(--g); font-size:12px; margin-bottom:15px;">ההודעה תישלח לכלל המשתמשים במערכת</p>
                <textarea id="admin-broadcast-msg" style="width:100%; height:100px; background:#000; border:1px solid #444; color:white; padding:15px; border-radius:12px;"></textarea>
                <button onclick="sendBroadcast()" style="width:100%; padding:15px; background:var(--b); border:none; border-radius:12px; font-weight:bold; margin-top:15px; cursor:pointer;">שדר לכולם</button>
            </div>
            <div class="admin-box">
                <h3>📊 נתוני מערכת</h3>
                <div id="stats-view" style="font-size:14px; color:var(--g);">טוען נתונים...</div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION - רפאל, תכניס כאן את הפרטים שלך
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER",
            appId: "YOUR_APP"
        };

        // Initialize Firebase
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();

        // FIX FOR THE "JUMPING" ISSUE:
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

        function startGoogleAuth() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.addScope('https://www.googleapis.com/auth/contacts.readonly');
            
            auth.signInWithPopup(provider).then(res => {
                sessionStorage.setItem('access_token', res.credential.accessToken);
                onUserLoaded(res.user);
            }).catch(e => {
                console.error("Auth Error:", e);
                alert("שגיאת התחברות: וודא שהדומיין שלך מאושר ב-Firebase Console.");
            });
        }

        function onUserLoaded(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            
            document.getElementById('u-photo').innerHTML = `<img src="${user.photoURL}" width="100%">`;
            document.getElementById('u-name').innerText = user.displayName;

            // בדיקת הרשאות מנהל רפאל
            if (user.email === 'rplzky7@gmail.com') {
                document.getElementById('adm-trigger').style.display = 'block';
                document.getElementById('crown-icon').style.display = 'block';
            }

            initAppLogic();
            if (Notification.permission !== 'granted') Notification.requestPermission();
        }

        function initAppLogic() {
            // סנכרון צ'אטים בזמן אמת
            db.ref('chats').on('value', snap => {
                const data = snap.val();
                renderChatList(data);
            });
        }

        function renderChatList(data) {
            const view = document.getElementById('chats-view');
            // מוקאפ להדגמה - בגרסה המלאה זה נמשך מה-DB
            view.innerHTML = `
                <div class="chat-entry">
                    <div style="width:55px; height:55px; border-radius:50%; background:var(--c); margin-left:15px; display:flex; align-items:center; justify-content:center; font-weight:bold; position:relative;">
                        י<div style="width:14px; height:14px; background:var(--green); border-radius:50%; position:absolute; bottom:2px; right:2px; border:3px solid #010409;"></div>
                    </div>
                    <div class="chat-info">
                        <h4>יהודה</h4>
                        <p>מה קורה רפאל? האפליקציה פצצה!</p>
                    </div>
                    <div style="font-size:11px; color:var(--g);">09:41</div>
                </div>
            `;
        }

        async function syncPeople() {
            const token = sessionStorage.getItem('access_token');
            if(!token) return;
            alert("מסנכרן אנשי קשר מגוגל...");
            try {
                const r = await fetch('https://people.googleapis.com/v1/people/me/connections?personFields=names,photos', {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                const d = await r.json();
                alert(`סונכרנו ${d.connections ? d.connections.length : 0} אנשי קשר.`);
            } catch(e) { alert("סנכרון נכשל."); }
        }

        function toggleAdmin(show) {
            document.getElementById('admin-panel').classList.toggle('open', show);
        }

        function sendBroadcast() {
            const msg = document.getElementById('admin-broadcast-msg').value;
            if(!msg) return;
            db.ref('broadcasts').push({
                content: msg,
                sender: 'Admin',
                timestamp: Date.now()
            });
            alert("ההודעה נשלחה בהצלחה לכל המשתמשים!");
            document.getElementById('admin-broadcast-msg').value = '';
        }

        function doLogout() {
            auth.signOut().then(() => location.reload());
        }

        // ניטור מצב חיבור
        auth.onAuthStateChanged(user => {
            if (user) onUserLoaded(user);
        });

        // מניעת תפריט ימני
        window.oncontextmenu = e => e.preventDefault();
    </script>
</body>
</html>
