<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Velora Ultra - Complete Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --b: #4da3ff; --bg: #0a0c10; --c: #161b22; --t: #e6edf3; --g: #8b949e; --r: #ff4d4d; --p: #a371f7; --gold: #f1c40f; --green: #2ea043; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--t); height: 100dvh; overflow: hidden; }
        .app { display: flex; flex-direction: column; height: 100%; }
        
        /* Header & Stories */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #0d1117; border-bottom: 1px solid #333; }
        .stories-bar { display: flex; gap: 15px; padding: 15px; overflow-x: auto; background: #010409; border-bottom: 1px solid #222; }
        .story-circle { min-width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--b); padding: 2px; position: relative; cursor: pointer; }
        .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .add-story { min-width: 65px; height: 65px; border-radius: 50%; border: 2px dashed var(--g); display: flex; align-items: center; justify-content: center; font-size: 30px; color: var(--g); cursor: pointer; }

        /* Main View */
        .main { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .chat-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222; cursor: pointer; }
        .av { width: 55px; height: 55px; border-radius: 50%; background: var(--c); margin-left: 12px; display: flex; align-items: center; justify-content: center; border: 1px solid #444; position: relative; overflow: hidden; }
        .status-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--green); position: absolute; bottom: 2px; right: 2px; border: 2px solid #000; }

        /* Chat Window */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; transform: translateY(100%); transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); display: flex; flex-direction: column; }
        .modal.open { transform: translateY(0); }
        #msg-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 15.5px; line-height: 1.4; position: relative; }
        .bubble.self { align-self: flex-end; background: var(--b); color: #000; border-bottom-right-radius: 4px; }
        .bubble.other { align-self: flex-start; background: #21262d; border-bottom-left-radius: 4px; }
        .once-btn { background: var(--p); color: white; border: none; padding: 5px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; margin-top: 5px; }

        /* Navigation */
        .nav { height: 75px; background: var(--c); display: flex; border-top: 1px solid #333; padding-bottom: env(safe-area-inset-bottom); }
        .nav-i { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--g); font-size: 11px; cursor: pointer; }
        .nav-i.active { color: var(--b); }

        /* Calls & Buttons */
        .call-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: space-around; padding: 60px 20px; }
        .call-screen.active { display: flex; }
        .c-btn { width: 65px; height: 65px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 24px; cursor: pointer; }
        .c-btn.off { background: var(--r); }
        .hangup { background: var(--r); width: 80px; height: 80px; }
        .btn { background: var(--b); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div id="auth-screen" style="height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:30px; text-align:center;">
        <h1 style="color:var(--b); font-size:75px; margin:0; letter-spacing:-3px;">Velora</h1>
        <p style="color:var(--g); margin-bottom:50px;">By Rafael Digital</p>
        <button class="btn" style="background:white; color:black; max-width:320px;" onclick="signIn()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" style="vertical-align:middle; margin-left:10px;">
            התחברות עם Google
        </button>
    </div>

    <div id="app-screen" class="app" style="display:none;">
        <header>
            <div style="display:flex; align-items:center; gap:12px;">
                <div id="my-av" class="av" style="width:38px; height:38px; border:2px solid var(--b);"></div>
                <h3 id="my-name">Velora</h3>
            </div>
            <div style="display:flex; gap:18px; align-items:center;">
                <span onclick="syncContacts()" style="font-size:24px; cursor:pointer;">👥</span>
                <span id="admin-crown" style="display:none; color:var(--gold); font-size:26px;">👑</span>
            </div>
        </header>

        <div class="stories-bar" id="stories">
            <div class="add-story" onclick="addStatus()">+</div>
        </div>

        <main class="main" id="chat-list"></main>

        <nav class="nav">
            <div class="nav-i active" onclick="tab('chats')"><span>💬</span>שיחות</div>
            <div class="nav-i" onclick="tab('status')"><span>⭕</span>סטטוסים</div>
            <div class="nav-i" onclick="logout()"><span>🚪</span>יציאה</div>
        </nav>
    </div>

    <div id="chat-page" class="modal">
        <header>
            <span onclick="closeChat()" style="font-size:26px; cursor:pointer;">⬅️</span>
            <h3 id="chat-title">צ'אט</h3>
            <div style="display:flex; gap:18px;">
                <span onclick="startCall('video')" style="cursor:pointer;">📹</span>
                <span onclick="startCall('audio')" style="cursor:pointer;">📞</span>
            </div>
        </header>
        <div id="msg-flow"></div>
        <div style="padding:15px; background:var(--c); display:flex; gap:12px; align-items:center;">
            <span id="voice-btn" onclick="voice()" style="font-size:26px; cursor:pointer;">🎤</span>
            <input type="text" id="m-in" placeholder="הודעה..." style="flex:1; background:none; border:none; color:white; font-size:16px; outline:none;">
            <span onclick="sendOnce()" style="font-size:24px; cursor:pointer;">👁️</span>
            <span onclick="send()" style="color:var(--b); font-weight:bold; font-size:18px; cursor:pointer;">שלח</span>
        </div>
    </div>

    <div id="call-ui" class="call-screen">
        <div style="text-align:center;">
            <div id="call-av" class="av" style="width:120px; height:120px; font-size:50px; margin:0 auto 25px; border:3px solid var(--b);">?</div>
            <h2 id="call-n" style="font-size:30px;">מתקשר...</h2>
            <p style="color:var(--g); margin-top:10px;">שיחה מוצפנת</p>
        </div>
        <div class="call-ctrls">
            <button class="c-btn" id="c-mic" onclick="cTgl('mic')">🎙️</button>
            <button class="c-btn" id="c-cam" onclick="cTgl('cam')">📷</button>
            <button class="c-btn" id="c-spk" onclick="cTgl('spk')">🔊</button>
            <button class="c-btn hangup" onclick="endCall()">📞</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "YOUR_KEY", authDomain: "YOUR_ID.firebaseapp.com", databaseURL: "https://YOUR_ID.firebaseio.com", projectId: "YOUR_ID", storageBucket: "YOUR_ID.appspot.com", messagingSenderId: "YOUR_SENDER", appId: "YOUR_APP" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database(), provider = new firebase.auth.GoogleAuthProvider();
        provider.addScope('https://www.googleapis.com/auth/contacts.readonly');

        let s = { user: null, token: null, chat: null, call: {mic:true, cam:true, spk:true} };
        const $ = id => document.getElementById(id);

        function signIn() {
            auth.signInWithPopup(provider).then(res => {
                s.token = res.credential.accessToken;
                s.user = res.user;
                $('auth-screen').style.display = 'none';
                $('app-screen').style.display = 'flex';
                $('my-name').innerText = s.user.displayName;
                $('my-av').innerHTML = `<img src="${s.user.photoURL}" width="100%">`;
                if(s.user.email === 'rplzky7@gmail.com') $('admin-crown').style.display = 'block';
                load();
            });
        }

        function load() {
            const chats = [{n:'יהודה', id:'1'}, {n:'יוסף חיים', id:'2'}, {n:'הפקה', id:'3'}];
            $('chat-list').innerHTML = chats.map(c => `
                <div class="chat-item" onclick="openChat('${c.n}')">
                    <div class="av">${c.n[0]}<div class="status-dot"></div></div>
                    <div style="flex:1"><b>${c.n}</b><br><small style="color:var(--g)">זמין כעת</small></div>
                </div>
            `).join('');

            const stories = [{img: 'https://via.placeholder.com/65', n:'אמא'}];
            stories.forEach(st => {
                $('stories').innerHTML += `<div class="story-circle"><img src="${st.img}"></div>`;
            });
        }

        function openChat(name) {
            s.chat = name; $('chat-title').innerText = name; $('chat-page').classList.add('open');
            $('msg-flow').innerHTML = '<p style="text-align:center; color:var(--g); font-size:12px;">הודעות נשמרות ב-Database</p>';
        }

        function send(type = 'text', val = null) {
            const v = val || $('m-in').value; if(!v) return;
            const h = `<div class="bubble self">${type === 'once' ? '<span style="color:var(--p)">👁️ מדיה חד פעמית</span>' : v}</div>`;
            $('msg-flow').innerHTML += h; $('m-in').value = '';
            $('msg-flow').scrollTop = $('msg-flow').scrollHeight;
        }

        function sendOnce() { const p = prompt("הכנס תוכן למחיקה:"); if(p) send('once', p); }
        function voice() { alert("הקלטה פעילה..."); send('text', '🎤 הודעה קולית (0:05)'); }
        function addStatus() { alert("בחר תמונה לסטטוס..."); }

        async function syncContacts() {
            const res = await fetch('https://people.googleapis.com/v1/people/me/connections?personFields=names,photos', { headers: { 'Authorization': `Bearer ${s.token}` } });
            const data = await res.json();
            if(data.connections) alert(`סונכרנו ${data.connections.length} אנשי קשר מגוגל!`);
        }

        function startCall(t) { $('call-n').innerText = s.chat; $('call-av').innerText = s.chat[0]; $('call-ui').classList.add('active'); }
        function endCall() { $('call-ui').classList.remove('active'); }
        function cTgl(t) { s.call[t] = !s.call[t]; $(`c-${t}`).classList.toggle('off', !s.call[t]); }
        function closeChat() { $('chat-page').classList.remove('open'); }
        function logout() { auth.signOut().then(() => location.reload()); }
        window.oncontextmenu = e => e.preventDefault();
    </script>
</body>
</html>
