<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Velora Ultra - Rafael Digital</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        :root { 
            --b: #4da3ff; --bg: #0a0c10; --c: #161b22; --t: #e6edf3; 
            --g: #8b949e; --green: #25d366; --w-light: #f8f9fa;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { 
            background: var(--bg); color: var(--t); font-family: -apple-system, system-ui, sans-serif;
            height: 100dvh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* מסך כניסה */
        #login-screen { 
            position: fixed; inset: 0; z-index: 2000; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px;
        }
        .v-logo { font-size: 80px; font-weight: 900; color: var(--b); letter-spacing: -4px; margin-bottom: 5px; }
        .g-btn { 
            background: white; color: black; border: none; padding: 18px 30px; border-radius: 50px; 
            font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; 
            gap: 12px; width: 100%; max-width: 320px; justify-content: center; margin-top: 40px;
        }

        /* מסך הרשאות */
        #perm-overlay { 
            position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 25px;
        }
        .perm-box { background: var(--c); padding: 30px; border-radius: 25px; text-align: center; border: 1px solid #333; }

        /* ממשק ראשי */
        #app { display: none; flex: 1; flex-direction: column; height: 100%; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #0d1117; border-bottom: 1px solid #333; }
        
        .main-view { flex: 1; overflow-y: auto; background: #010409; }

        /* שורת משימות (לפי התמונה ששלחת) */
        .tab-bar { 
            height: 85px; background: var(--w-light); display: flex; border-top: 1px solid #ddd;
            padding-bottom: env(safe-area-inset-bottom); justify-content: space-around; align-items: center;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: #555; font-size: 12px; flex: 1; cursor: pointer; position: relative; }
        .tab-item.active { color: #000; font-weight: bold; }
        
        .chat-icon-bg { background: #dcf8c6; padding: 8px 22px; border-radius: 20px; margin-bottom: 4px; position: relative; }
        .badge { position: absolute; top: -5px; right: 5px; background: var(--green); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; border: 2px solid var(--w-light); }
        .nav-svg { width: 24px; height: 24px; }

        .user-avatar { width: 26px; height: 26px; border-radius: 50%; background: #ccc; overflow: hidden; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="v-logo">VELORA</div>
        <div style="color:var(--g); letter-spacing: 2px;">RAFAEL DIGITAL</div>
        <button class="g-btn" onclick="handleAuth()">כניסה עם Google</button>
        <a href="https://did.li/Rafael-Digital-office" style="margin-top:50px; color:var(--b); text-decoration:none; font-size:14px;">נוצר על ידי רפאל דיגיטל</a>
    </div>

    <div id="perm-overlay">
        <div class="perm-box">
            <h2 style="margin-bottom:15px;">כמעט שם...</h2>
            <p style="color:var(--g); margin-bottom:25px;">כדי שנוכל לסנכרן אנשי קשר, לשלוח קבצים ולהתריע על הודעות, דרוש אישור:</p>
            <button onclick="requestPermissions()" style="background:var(--b); color:white; border:none; padding:15px 40px; border-radius:50px; font-weight:bold; width:100%;">אשר את כל ההרשאות</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <div id="hdr-pic" style="width:35px; height:35px; border-radius:50%; overflow:hidden; border:2px solid var(--b);"></div>
                <b id="hdr-name"></b>
            </div>
            <div style="display:flex; gap:20px; font-size:20px; cursor:pointer;">
                <span onclick="syncContacts()">👥</span>
                <span onclick="logout()">🚪</span>
            </div>
        </header>

        <div class="main-view" id="content">
            <div style="padding:20px; text-align:center; color:var(--g); margin-top:50px;">טוען הודעות...</div>
        </div>

        <nav class="tab-bar">
            <div class="tab-item active">
                <div class="chat-icon-bg">
                    <svg class="nav-svg" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" fill="#075e54"/></svg>
                    <div class="badge">34</div>
                </div>
                <span>צ'אטים</span>
            </div>
            <div class="tab-item">
                <svg class="nav-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" fill="#000"/></svg>
                <span>עדכונים</span>
            </div>
            <div class="tab-item">
                <svg class="nav-svg" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3z" fill="#000"/></svg>
                <span>קהילות</span>
            </div>
            <div class="tab-item">
                <svg class="nav-svg" viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-2.2 2.2c-2.83-1.44-5.15-3.75-6.59-6.58l2.2-2.21c.28-.27.36-.66.25-1.01" fill="none" stroke="#000" stroke-width="2"/></svg>
                <span>שיחות</span>
            </div>
            <div class="tab-item">
                <div id="mini-av" class="user-avatar"></div>
                <span>את/ה</span>
            </div>
        </nav>
    </div>

    <script>
        // הכנס כאן את ה-Config שלך
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            appId: "YOUR_APP"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

        // פונקציית התחברות עם Redirect למניעת חסימות
        function handleAuth() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.addScope('https://www.googleapis.com/auth/contacts.readonly');
            auth.signInWithRedirect(provider);
        }

        // בדיקה לאחר חזרה מהתחברות
        auth.getRedirectResult().then(res => {
            if (res.user) {
                localStorage.setItem('g_token', res.credential.accessToken);
                initApp(res.user);
            }
        });

        auth.onAuthStateChanged(user => { if (user) initApp(user); });

        function initApp(user) {
            if (Notification.permission === "default") {
                document.getElementById('perm-overlay').style.display = 'flex';
            } else {
                renderUI(user);
            }
        }

        async function requestPermissions() {
            // התראות
            await Notification.requestPermission();
            // מצלמה ומיקרופון (אחסון/מדיה)
            try { await navigator.mediaDevices.getUserMedia({audio:true, video:true}); } catch(e){}
            
            document.getElementById('perm-overlay').style.display = 'none';
            renderUI(auth.currentUser);
        }

        function renderUI(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('hdr-name').innerText = user.displayName;
            document.getElementById('hdr-pic').innerHTML = `<img src="${user.photoURL}" width="100%">`;
            document.getElementById('mini-av').innerHTML = `<img src="${user.photoURL}" width="100%">`;
            
            loadRealtimeData();
        }

        function loadRealtimeData() {
            db.ref('chats').on('value', snap => {
                // לוגיקת הצגת ההודעות
            });
        }

        async function syncContacts() {
            const token = localStorage.getItem('g_token');
            if(!token) return;
            alert("מסנכרן אנשי קשר...");
            const r = await fetch('https://people.googleapis.com/v1/people/me/connections?personFields=names,photos', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const d = await r.json();
            console.log("Contacts:", d);
        }

        function logout() { auth.signOut().then(() => { localStorage.clear(); location.reload(); }); }
        window.oncontextmenu = e => e.preventDefault();
    </script>
</body>
</html>
