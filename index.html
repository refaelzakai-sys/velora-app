<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Velora Ultra - Official</title>
    <style>
        :root { --b: #4da3ff; --bg: #0a0c10; --c: #161b22; --t: #e6edf3; --g: #8b949e; --r: #ff4d4d; --p: #a371f7; --gold: #f1c40f; --green: #2ea043; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--t); height: 100dvh; overflow: hidden; user-select: none; }
        .app { display: flex; flex-direction: column; height: 100%; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #0d1117; border-bottom: 1px solid #333; z-index: 100; }
        .main { flex: 1; overflow-y: auto; background: #010409; padding-bottom: 80px; }
        .chat-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222; cursor: pointer; }
        .av { width: 50px; height: 50px; border-radius: 50%; background: var(--c); margin-left: 12px; display: flex; align-items: center; justify-content: center; border: 1px solid #444; position: relative; font-weight: bold; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--green); position: absolute; bottom: 0; right: 0; border: 2px solid #000; }
        .nav { height: 75px; background: var(--c); display: flex; border-top: 1px solid #333; padding-bottom: env(safe-area-inset-bottom); }
        .nav-i { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--g); font-size: 11px; cursor: pointer; }
        .nav-i.active { color: var(--b); }
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; transform: translateY(100%); transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); display: flex; flex-direction: column; }
        .modal.open { transform: translateY(0); }
        .btn { background: var(--b); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google { background: white; color: #000; font-size: 14px; }
        
        /* Call Interface */
        .call-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: space-between; padding: 60px 20px; }
        .call-screen.active { display: flex; }
        .call-ctrls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; max-width: 320px; margin-bottom: 40px; }
        .c-btn { width: 65px; height: 65px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 24px; cursor: pointer; }
        .c-btn.off { background: var(--r); }
        .hangup { background: var(--r); grid-column: 2; width: 75px; height: 75px; font-size: 30px; }
    </style>
</head>
<body>

    <div id="auth" style="height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:30px; text-align:center;">
        <h1 style="color:var(--b); font-size:65px; margin:0;">Velora</h1>
        <p style="color:var(--g)">Digital Infrastructure by Rafael</p>
        <div style="width:100%; max-width:320px; margin-top:40px;">
            <button class="btn btn-google" onclick="doLogin('google')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18"> התחברות עם Google
            </button>
            <p style="font-size:12px; color:var(--g); margin:15px;">או</p>
            <input type="email" id="email-in" placeholder="כתובת אימייל" style="width:100%; padding:15px; border-radius:12px; border:1px solid #333; background:var(--c); color:white; text-align:center;">
            <button class="btn" onclick="doLogin('mail')">כניסה למערכת</button>
        </div>
    </div>

    <div id="app" class="app" style="display:none;">
        <header>
            <h2 style="margin:0;">Velora</h2>
            <div style="display:flex; gap:20px; align-items:center;">
                <span onclick="triggerSync()" style="cursor:pointer; font-size:22px;">👥</span>
                <span onclick="toggleAppLock()" style="cursor:pointer; font-size:24px;">🔒</span>
                <span id="admin-icon" style="display:none; color:var(--gold); font-size:24px;">👑</span>
            </div>
        </header>
        <main class="main" id="content-view"></main>
        <nav class="nav">
            <div class="nav-i active" onclick="switchTab('chats')"><span>💬</span>שיחות</div>
            <div class="nav-i" onclick="switchTab('groups')"><span>👥</span>קהילות</div>
            <div class="nav-i" onclick="switchTab('me')"><span>👤</span>פרופיל</div>
        </nav>
    </div>

    <div id="call-overlay" class="call-screen">
        <div style="text-align:center;">
            <div class="av" style="width:110px; height:110px; font-size:45px; margin:0 auto 20px;" id="call-av">?</div>
            <h2 id="call-name" style="margin:5px;">שם המשתמש</h2>
            <p id="call-mode" style="color:var(--g)">שיחה מוצפנת</p>
        </div>
        <div class="call-ctrls">
            <button class="c-btn" id="mic-btn" onclick="ctrl('mic')">🎙️</button>
            <button class="c-btn" id="cam-btn" onclick="ctrl('cam')">📷</button>
            <button class="c-btn" id="spk-btn" onclick="ctrl('spk')">🔊</button>
            <button class="c-btn hangup" onclick="killCall()">📞</button>
        </div>
    </div>

    <script>
        let appState = { user: null, locked: true, tab: 'chats', contacts: [], callSettings: {mic:true, cam:true, spk:true} };
        const $ = id => document.getElementById(id);

        function doLogin(type) {
            const email = $('email-in').value || (type === 'google' ? 'user@google.com' : '');
            if(!email.includes('@')) return alert('נא להזין מייל תקין');
            appState.user = { email, admin: email === 'rplzky7@gmail.com' };
            $('auth').style.display = 'none'; $('app').style.display = 'flex';
            if(appState.user.admin) $('admin-icon').style.display = 'block';
            initApp();
            if(Notification.permission !== 'granted') Notification.requestPermission();
        }

        function initApp() {
            appState.contacts = [
                {n: 'יהודה', t: 'chat', h: false},
                {n: 'יוסף חיים', t: 'chat', h: false},
                {n: 'קבוצת פיתוח רפאל דיגיטל', t: 'group', h: false},
                {n: 'קהילת Velora', t: 'community', h: false}
            ];
            renderUI();
        }

        function triggerSync() {
            alert("סנכרון אנשי קשר מבוצע...");
            appState.contacts.push({n: 'אמא', t: 'chat', h: false});
            renderUI();
        }

        function renderUI() {
            const view = $('content-view');
            const list = appState.contacts.filter(c => appState.tab === 'groups' ? (c.t !== 'chat') : (appState.locked ? !c.h : c.h));
            view.innerHTML = list.map(c => `
                <div class="chat-item" onclick="openCallUI('${c.n}')">
                    <div class="av">${c.n[0]} <div class="status-dot"></div></div>
                    <div style="flex:1"><b>${c.n}</b><br><small style="color:var(--g)">${c.t}</small></div>
                </div>
            `).join('') + `<button class="btn" style="width:90%; margin:20px 5%; opacity:0.6;" onclick="addManual()">+ הוסף צ'אט חדש</button>`;
        }

        function openCallUI(name) {
            $('call-name').innerText = name;
            $('call-av').innerText = name[0];
            $('call-overlay').classList.add('active');
            if(Notification.permission === 'granted') {
                new Notification("Velora", { body: `שיחה פעילה עם ${name}` });
            }
        }

        function ctrl(type) {
            appState.callSettings[type] = !appState.callSettings[type];
            const b = $(type+'-btn');
            b.classList.toggle('off', !appState.callSettings[type]);
            if(type === 'mic') b.innerText = appState.callSettings.mic ? '🎙️' : '🔇';
            if(type === 'cam') b.innerText = appState.callSettings.cam ? '📷' : '🚫';
            if(type === 'spk') b.innerText = appState.callSettings.spk ? '🔊' : '🔈';
        }

        function killCall() { $('call-overlay').classList.remove('active'); }
        function switchTab(t) { 
            appState.tab = t; 
            document.querySelectorAll('.nav-i').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderUI(); 
        }
        function toggleAppLock() { appState.locked = !appState.locked; renderUI(); }
        function addManual() { 
            const n = prompt("שם:"); 
            if(n) { appState.contacts.push({n, t:'chat', h:confirm("להגן ב-PIN?")}); renderUI(); }
        }

        window.oncontextmenu = e => e.preventDefault();
    </script>
</body>
</html>
