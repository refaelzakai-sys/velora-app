<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Velora Ultra v40.0 - Final Stable</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --b: #4da3ff; --bg: #0a0c10; --c: #161b22; --t: #e6edf3; --g: #8b949e; --r: #ff4d4d; --p: #a371f7; --gold: #f1c40f; --green: #2ea043; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--t); height: 100dvh; overflow: hidden; }
        
        /* Auth Screen */
        .auth-container { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; background: radial-gradient(circle at center, #1c2128 0%, #0a0c10 100%); }
        .velora-logo { font-size: 75px; color: var(--b); font-weight: 800; letter-spacing: -3px; margin-bottom: 5px; }
        .btn-google { background: white; color: black; border: none; padding: 18px 25px; border-radius: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 16px; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-google:active { transform: scale(0.95); }

        /* App UI */
        .app { display: none; flex-direction: column; height: 100%; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #0d1117; border-bottom: 1px solid #333; }
        .stories { display: flex; gap: 15px; padding: 15px; overflow-x: auto; background: #010409; border-bottom: 1px solid #222; }
        .story { min-width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--b); padding: 2px; }
        .story img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        /* Chat & Bubbles */
        .main { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .chat-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .av { width: 50px; height: 50px; border-radius: 50%; background: var(--c); margin-left: 12px; display: flex; align-items: center; justify-content: center; position: relative; border: 1px solid #333; }
        #msg-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 15px; }
        .bubble.self { align-self: flex-end; background: var(--b); color: #000; }
        .bubble.other { align-self: flex-start; background: #21262d; }

        /* Call Overlay */
        .call-ui { position: fixed; inset: 0; background: #000; z-index: 9000; display: none; flex-direction: column; align-items: center; justify-content: space-around; padding: 50px; }
        .c-btn { width: 70px; height: 70px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 28px; }
        .hangup { background: var(--r); }

        /* Nav */
        .nav { height: 75px; background: var(--c); display: flex; border-top: 1px solid #333; padding-bottom: env(safe-area-inset-bottom); }
        .nav-i { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--g); font-size: 11px; }
        .nav-i.active { color: var(--b); }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="velora-logo">Velora</div>
        <p style="color:var(--g); margin-bottom:40px;" id="auth-subtitle">Digital Infrastructure by Rafael</p>
        <button class="btn-google" id="login-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="22">
            <span id="login-text">Sign in with Google</span>
        </button>
    </div>

    <div id="app-screen" class="app">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <div id="my-av" class="av" style="width:35px; height:35px;"></div>
                <h3 id="my-name">Velora</h3>
            </div>
            <div style="display:flex; gap:15px; align-items:center;">
                <span onclick="sync()" style="font-size:22px;">👥</span>
                <span id="admin-crown" style="display:none; color:var(--gold); font-size:22px;">👑</span>
                <span onclick="logout()" style="color:var(--r);">🚪</span>
            </div>
        </header>
        <div class="stories" id="story-bar">
            <div style="min-width:65px; height:65px; border-radius:50%; border:2px dashed #444; display:flex; align-items:center; justify-content:center; font-size:30px;">+</div>
        </div>
        <main class="main" id="chat-list"></main>
        <nav class="nav">
            <div class="nav-i active"><span>💬</span>שיחות</div>
            <div class="nav-i"><span>⭕</span>סטטוסים</div>
            <div class="nav-i"><span>👤</span>פרופיל</div>
        </nav>
    </div>

    <div id="call-screen" class="call-ui">
        <h2 id="call-target" style="font-size:30px;">מתקשר...</h2>
        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:20px;">
            <button class="c-btn" onclick="this.classList.toggle('hangup')">🎙️</button>
            <button class="c-btn" onclick="this.classList.toggle('hangup')">📷</button>
            <button class="c-btn" onclick="this.classList.toggle('hangup')">🔊</button>
            <button class="c-btn hangup" style="grid-column:2" onclick="endCall()">📞</button>
        </div>
    </div>

    <script>
        // CONFIG - Replace with your Firebase details
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.js",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER",
            appId: "YOUR_APP"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const db = firebase.database();
        const $ = id => document.getElementById(id);

        // Language Detection for Login Page
        const userLang = navigator.language || navigator.userLanguage;
        if (userLang.startsWith('he')) {
            $('login-text').innerText = "התחברות עם Google";
            $('auth-subtitle').innerText = "תשתית דיגיטלית מאובטחת";
        }

        // --- THE FIXED LOGIN FUNCTION ---
        $('login-btn').onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.addScope('https://www.googleapis.com/auth/contacts.readonly');
            
            auth.signInWithPopup(provider).then(res => {
                const user = res.user;
                const token = res.credential.accessToken;
                sessionStorage.setItem('g_token', token);
                setupApp(user);
            }).catch(err => {
                console.error(err);
                alert("שגיאת התחברות. וודא שהגדרת את Firebase נכון.");
            });
        };

        function setupApp(user) {
            $('auth-screen').style.display = 'none';
            $('app-screen').style.display = 'flex';
            $('my-name').innerText = user.displayName;
            $('my-av').innerHTML = `<img src="${user.photoURL}" width="100%" style="border-radius:50%">`;
            
            // ADMIN CHECK
            if (user.email === 'rplzky7@gmail.com') {
                $('admin-crown').style.display = 'block';
                console.log("Admin Access Granted");
            }

            loadChats();
            if (Notification.permission !== 'granted') Notification.requestPermission();
        }

        function loadChats() {
            const mock = [{n:'יהודה', id:'1'}, {n:'אמא', id:'2'}, {n:'קבוצת פיתוח', id:'3'}];
            $('chat-list').innerHTML = mock.map(c => `
                <div class="chat-item" onclick="startCall('${c.n}')">
                    <div class="av">${c.n[0]}<div style="width:12px; height:12px; background:var(--green); border-radius:50%; position:absolute; bottom:0; right:0; border:2px solid #000;"></div></div>
                    <div style="flex:1"><b>${c.n}</b><br><small style="color:var(--g)">זמין</small></div>
                </div>
            `).join('');
        }

        function startCall(name) {
            $('call-target').innerText = name;
            $('call-screen').style.display = 'flex';
        }

        function endCall() { $('call-screen').style.display = 'none'; }

        async function sync() {
            const token = sessionStorage.getItem('g_token');
            if(!token) return;
            alert("מסנכרן אנשי קשר מגוגל...");
            const res = await fetch('https://people.googleapis.com/v1/people/me/connections?personFields=names,photos', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if(data.connections) alert(`הצלחה! סונכרנו ${data.connections.length} אנשי קשר.`);
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        // Persistent Auth Check
        auth.onAuthStateChanged(user => { if(user) setupApp(user); });
        window.oncontextmenu = e => e.preventDefault();
    </script>
</body>
</html>
