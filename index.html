<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <title>Velora</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.ibb.co/RGmVcHyd/logo.jpg">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --b: #4da3ff; --bg: #0a0c10; --c: #161b22; --t: #e6edf3; --g: #8b949e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--t); font-family: -apple-system, system-ui, sans-serif; height: 100dvh; display: flex; flex-direction: column; }
        
        #login-screen { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: var(--bg); z-index: 10; }
        .v-logo { font-size: 85px; font-weight: 900; color: var(--b); letter-spacing: -5px; margin-bottom: 20px; }
        
        .g-btn { 
            background: white; color: black; border: none; padding: 18px 35px; border-radius: 50px; 
            font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; 
            gap: 12px; box-shadow: 0 4px 15px rgba(255,255,255,0.1); transition: 0.2s;
        }

        #app { display: none; padding: 20px; flex: 1; overflow-y: auto; text-align: center; }
        .user-card { background: var(--c); padding: 15px; border-radius: 15px; margin-top: 20px; border: 1px solid #333; }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; border: 2px solid var(--b); }
        .logout-btn { margin-top: 30px; background: none; color: #ff4d4d; border: none; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="v-logo">VELORA</div>
        <button id="login-btn" class="g-btn">Continue with Google</button>
    </div>

    <div id="app">
        <div class="user-card">
            <img id="u-img" class="profile-pic" src="">
            <h2 id="u-name"></h2>
            <p id="u-email" style="color:var(--g); font-size: 14px;"></p>
        </div>
        
        <p style="margin-top:40px; color:var(--g);">המערכת שומרת את הפרטים שלך למסד הנתונים...</p>
        
        <button onclick="logout()" class="logout-btn">נתק חשבון</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDunrG_booopCpxqpcGEhbqr5n-HY7glHU",
            authDomain: "velora-617fa.firebaseapp.com",
            databaseURL: "https://velora-617fa-default-rtdb.firebaseio.com",
            projectId: "velora-617fa",
            storageBucket: "velora-617fa.firebasestorage.app",
            messagingSenderId: "299931306828",
            appId: "1:299931306828:web:ca3c2533144fba6de49de9",
            measurementId: "G-ZC5E26QR9K"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        document.getElementById('login-btn').addEventListener('click', () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });

            auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => {
                return auth.signInWithPopup(provider);
            }).then(res => {
                saveUserToDatabase(res.user);
            }).catch(e => console.error(e));
        });

        auth.onAuthStateChanged(user => {
            if (user) {
                showApp(user);
                saveUserToDatabase(user); // עדכון פרטים בכל כניסה
            } else {
                showLogin();
            }
        });

        function saveUserToDatabase(user) {
            const userRef = db.ref('users/' + user.uid);
            userRef.update({
                uid: user.uid,
                displayName: user.displayName,
                email: user.email,
                photoURL: user.photoURL,
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function showApp(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('u-name').innerText = user.displayName;
            document.getElementById('u-email').innerText = user.email;
            document.getElementById('u-img').src = user.photoURL || 'https://via.placeholder.com/80';
        }

        function showLogin() {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }

        function logout() {
            auth.signOut().then(() => location.reload());
        }
    </script>
</body>
</html>
