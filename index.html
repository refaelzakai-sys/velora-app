        body { background: var(--bg); color: var(--t); font-family: -apple-system, system-ui, sans-serif; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
        #login-screen { position: fixed; inset: 0; z-index: 2000; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .v-logo { font-size: 85px; font-weight: 900; color: var(--b); letter-spacing: -5px; }
        .g-btn { background: white; color: black; border: none; padding: 18px 35px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-top: 50px; width: 85%; max-width: 320px; justify-content: center; box-shadow: 0 4px 15px rgba(255,255,255,0.1); transition: 0.2s; }

        #install-wall { position: fixed; inset: 0; z-index: 5000; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }

<body>

    <div id="install-wall">

    <div id="login-screen">
        <div class="v-logo">VELORA</div>
        <button id="login-btn" class="g-btn">Continue with Google</button>
        <a id="credit-text" href="https://did.li/Rafael-Digital-office" class="credit-link"></a>
    </div>

    <div id="app">
        <h2 id="u-name"></h2>
        <p style="color:var(--g); margin-top:15px;">Welcome to the secure experience.</p>
        <button onclick="logout()" style="margin-top:40px; background:none; color:var(--b); border:none; font-size:16px; cursor:pointer;">Logout</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDunrG_booopCpxqpcGEhbqr5n-HY7glHU",
            authDomain: "velora-617fa.firebaseapp.com",
            databaseURL: "https://velora-617fa-default-rtdb.firebaseio.com",
            projectId: "velora-617fa",
            storageBucket: "velora-617fa.firebasestorage.app",
            messagingSenderId: "299931306828",
            appId: "1:299931306828:web:ca3c2533144fba6de49de9",
            measurementId: "G-ZC5E26QR9K"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const userLang = navigator.language.startsWith('he') ? 'he' : 'en';
        const i18n = {
            he: { credit: "נוצר באהבה על ידי: רפאל דיגיטל", pwa: "יש להתקין את האפליקציה למסך הבית כדי להתחיל.", btn: "המשך עם Google" },
            en: { credit: "Created with love by: Rafael Digital", pwa: "Please install the app to your home screen to start.", btn: "Continue with Google" }
        };
        
        document.getElementById('credit-text').innerText = i18n[userLang].credit;
        document.getElementById('pwa-text').innerText = i18n[userLang].pwa;
        document.getElementById('login-btn').innerText = i18n[userLang].btn;

        document.getElementById('login-btn').addEventListener('click', function() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider).catch(e => alert("Error: " + e.message));
        });

        auth.getRedirectResult().then(res => { if (res.user) handleUser(res.user); });
        auth.onAuthStateChanged(user => { if (user) handleUser(user); });

        function handleUser(user) {
            const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
            if (!isPWA) {
                document.getElementById('install-wall').style.display = 'flex';
                document.getElementById('login-screen').style.display = 'none';
            } else {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('u-name').innerText = (userLang === 'he' ? "ברוך הבא, " : "Welcome, ") + user.displayName;
            }
        }

        window.logout = () => auth.signOut().then(() => location.reload());
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
    </script>
