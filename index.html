    <style>
        :root { --b: #4da3ff; --bg: #0a0c10; --c: #161b22; --t: #e6edf3; --g: #8b949e; --green: #25d366; --nav: #f8f9fa; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--t); font-family: -apple-system, system-ui, sans-serif; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        /* חומת התקנה */
        #install-wall { position: fixed; inset: 0; z-index: 5000; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
        .inst-card { background: var(--c); padding: 30px; border-radius: 30px; border: 1px solid #333; width: 100%; max-width: 360px; }
        
        /* מסך כניסה */
        #login-screen { position: fixed; inset: 0; z-index: 2000; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .v-logo { font-size: 85px; font-weight: 900; color: var(--b); letter-spacing: -5px; }
        .g-btn { background: white; color: black; border: none; padding: 18px 35px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-top: 50px; width: 85%; max-width: 320px; justify-content: center; }

        /* אפליקציה */
        #app { display: none; height: 100%; flex-direction: column; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #0d1117; border-bottom: 1px solid #333; }
        
        /* שורת משימות (מבוסס על התמונה שלך) */
        .tab-bar { height: 85px; background: var(--nav); display: flex; border-top: 1px solid #ddd; padding-bottom: env(safe-area-inset-bottom); justify-content: space-around; align-items: center; }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: #555; font-size: 11px; flex: 1; position: relative; cursor: pointer; }
        .tab-item.active { color: #000; font-weight: bold; }
        .chat-pill { background: #dcf8c6; padding: 8px 22px; border-radius: 20px; margin-bottom: 3px; position: relative; }
        .badge { position: absolute; top: -5px; right: 5px; background: var(--green); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; border: 2px solid var(--nav); }
        .nav-icon { width: 24px; height: 24px; filter: grayscale(1); opacity: 0.6; }
        .active .nav-icon { filter: none; opacity: 1; }

                <span>שיחות</span>

            <div class="tab-item">
                <div id="u-mini" class="u-pic" style="margin-bottom:5px;"></div>
                <span>את/ה</span>
            </div>
        </nav>
    </div>

    <script>
        // CONFIG - וודא שהפרטים כאן נכונים
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            appId: "YOUR_APP"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // בדיקת התקנה
        function checkPWA() {
            const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
            if (!isPWA) {
                document.getElementById('install-wall').style.display = 'flex';
                const guide = document.getElementById('inst-guide');
                if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
                    guide.innerHTML = "לחץ על כפתור ה-<b>שיתוף</b> בתחתית ואז על <b>'הוספה למסך הבית'</b>";
                } else {
                    guide.innerHTML = "לחץ על 3 הנקודות בדפדפן ובחר באופציה <b>'התקן אפליקציה'</b>";
                }
                return false;
            }
            return true;
        }

        // התחברות
        function startLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.addScope('https://www.googleapis.com/auth/contacts.readonly');
            auth.signInWithPopup(provider).catch(e => {
                console.error(e);
                alert("שגיאה בהתחברות. וודא שגוגל מופעל ב-Firebase.");
            });
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                if (checkPWA()) {
                    loadApp(user);
                }
            }
        });

        async function loadApp(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('u-info').innerHTML = `<img src="${user.photoURL}" width="35" style="border-radius:50%"> <b>${user.displayName}</b>`;
            document.getElementById('u-mini').innerHTML = `<img src="${user.photoURL}" width="100%">`;

            // בקשת הרשאות
            Notification.requestPermission();
            try { await navigator.mediaDevices.getUserMedia({audio:true, video:true}); } catch(e){}
        }

        function logout() { auth.signOut().then(() => location.reload()); }
        window.oncontextmenu = e => e.preventDefault();
    </script>
