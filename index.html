<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Velora</title>
    
    <meta name="description" content="Velora: Connect Chat Call Effortlessly. Your all-in-one messaging app for simple and secure communication">
    <meta name="keywords" content="צ'אט, הודעות, אפליקציית מסרים, הודעות מיידיות, שיחות וידאו, שיחות קוליות, ולוהרה, Velora, messaging app, WhatsApp alternative">
    
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.ibb.co/313093/313093.jpg">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>

    <style>
        :root { --b: #4da3ff; --bg: #0a0c10; --c: #161b22; --t: #e6edf3; --g: #8b949e; --green: #25d366; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--t); font-family: -apple-system, system-ui, sans-serif; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        /* חומת התקנה */
        #install-wall { position: fixed; inset: 0; z-index: 5000; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
        .inst-card { background: var(--c); padding: 30px; border-radius: 30px; border: 1px solid #333; width: 100%; max-width: 360px; }

        /* לוגין */
        #login-screen { position: fixed; inset: 0; z-index: 2000; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .v-logo { font-size: 85px; font-weight: 900; color: var(--b); letter-spacing: -5px; }
        .g-btn { background: white; color: black; border: none; padding: 18px 35px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-top: 50px; width: 85%; max-width: 320px; justify-content: center; }

        /* אפליקציה */
        #app { display: none; height: 100%; flex-direction: column; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #0d1117; border-bottom: 1px solid #333; }
        .tab-bar { height: 85px; background: #f8f9fa; display: flex; border-top: 1px solid #ddd; padding-bottom: env(safe-area-inset-bottom); justify-content: space-around; align-items: center; }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: #555; font-size: 11px; flex: 1; text-align: center; }
        .credit-link { margin-top: 60px; color: var(--b); text-decoration: none; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

    <div id="install-wall">
        <div class="inst-card">
            <img src="https://i.ibb.co/313093/313093.jpg" width="90" style="border-radius:20px; margin-bottom:20px;">
            <h2 id="install-title">Install Velora</h2>
            <p id="pwa-text" style="color:var(--g); margin: 15px 0;"></p>
        </div>
    </div>

    <div id="login-screen">
        <div class="v-logo">VELORA</div>
        <button class="g-btn" onclick="login()">Continue with Google</button>
        <a id="credit-text" href="https://did.li/Rafael-Digital-office" class="credit-link"></a>
    </div>

    <div id="app">
        <header>
            <div id="u-display" style="display:flex; align-items:center; gap:10px;"></div>
            <span onclick="logout()" style="cursor:pointer; font-size:20px;">🚪</span>
        </header>
        <main style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--g); text-align:center; padding:20px;">
            <div id="main-status">Connecting to secure servers...</div>
        </main>
        <nav class="tab-bar">
            <div class="tab-item">💬<br><span class="lang-chats">Chats</span></div>
            <div class="tab-item">⭕<br><span class="lang-updates">Updates</span></div>
            <div class="tab-item">👥<br><span class="lang-comm">Communities</span></div>
            <div class="tab-item">📞<br><span class="lang-calls">Calls</span></div>
        </nav>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            appId: "YOUR_APP"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // תרגום דינמי
        const userLang = navigator.language.startsWith('he') ? 'he' : 'en';
        const i18n = {
            he: { credit: "נוצר באהבה על ידי: רפאל דיגיטל", pwa: "יש להתקין את האפליקציה למסך הבית כדי להמשיך.", chats: "צ'אטים", updates: "עדכונים", comm: "קהילות", calls: "שיחות" },
            en: { credit: "Created with love by: Rafael Digital", pwa: "Please install the app to your home screen to continue.", chats: "Chats", updates: "Updates", comm: "Communities", calls: "Calls" }
        };

        document.getElementById('credit-text').innerText = i18n[userLang].credit;
        document.getElementById('pwa-text').innerText = i18n[userLang].pwa;
        document.querySelector('.lang-chats').innerText = i18n[userLang].chats;
        document.querySelector('.lang-updates').innerText = i18n[userLang].updates;
        document.querySelector('.lang-comm').innerText = i18n[userLang].comm;
        document.querySelector('.lang-calls').innerText = i18n[userLang].calls;

        // רישום Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(() => console.log("SW Registered"));
        }

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider);
        }

        auth.getRedirectResult().then(res => { if (res.user) checkPWA(res.user); });
        auth.onAuthStateChanged(user => { if (user) checkPWA(user); });

        function checkPWA(user) {
            const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
            if (!isPWA) {
                document.getElementById('install-wall').style.display = 'flex';
            } else {
                showApp(user);
            }
        }

        function showApp(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('u-display').innerHTML = `<img src="${user.photoURL}" width="35" style="border-radius:50%"> <b>${user.displayName}</b>`;
            
            // בקשת הרשאת התראות
            Notification.requestPermission();
        }

        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
