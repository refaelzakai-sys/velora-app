<!DOCTYPE html>
<html lang="he" id="main-html" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Velora Premium - Rafael Digital</title>
    
    <style>
        :root { 
            --primary: #1a237e; --primary-light: #534bae; --accent: #c5a059; 
            --bg-chat: #e5ddd5; --bg-main: #f0f2f5; --business: #004d40;
        }

        /* מניעת העתקה וצילום מסך למשתמשים */
        body.user-restricted { -webkit-user-select: none; user-select: none; }
        
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-main); height: 100vh; overflow: hidden; display: flex; }
        .hidden { display: none !important; }

        /* מסך כניסה מעוצב */
        #login-screen {
            position: fixed; inset: 0; background: linear-gradient(135deg, #1a237e 0%, #000051 100%);
            z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
            text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .google-btn {
            background: white; color: #444; padding: 12px 25px; border-radius: 5px;
            border: none; font-size: 16px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; gap: 10px; margin-top: 20px; transition: 0.3s;
        }
        .google-btn:hover { background: #f1f1f1; transform: translateY(-2px); }
        .footer-credit { position: absolute; bottom: 20px; font-size: 12px; opacity: 0.7; }

        /* סיידבר ופילטרים (לפי התמונה) */
        #sidebar { width: 350px; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
        .filter-bar { display: flex; gap: 8px; padding: 10px; overflow-x: auto; background: white; border-bottom: 1px solid #eee; }
        .filter-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; white-space: nowrap; font-size: 14px; }
        .filter-btn.active { background: #e7f5e9; color: #15803d; border-color: #15803d; }

        /* חלון צ'אט */
        #chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); }
        .msg { padding: 10px; margin: 5px; border-radius: 8px; max-width: 75%; position: relative; }
        .sent { align-self: flex-end; background: #d9fdd3; }
        .received { align-self: flex-start; background: white; }
    </style>
</head>
<body id="app-body">

    <div id="login-screen">
        <div class="login-card">
            <img src="https://img.uniquemu.co.il/upload2/35gwzs3j/9e00732bba4442cec056fb05ac6dfcea-png.png" width="100" style="margin-bottom: 20px;">
            <h1 style="margin: 0;">Velora</h1>
            <p style="opacity: 0.8;">הדור הבא של התקשורת העסקית</p>
            
            <button class="google-btn" id="loginBtn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
                התחברות מהירה עם Google
            </button>
            <div id="login-loader" class="hidden" style="margin-top:15px;">מתחבר...</div>
        </div>
        <div class="footer-credit">נבנה בגאווה ע"י Rafael Digital</div>
    </div>

    <div id="main-app" class="hidden" style="display:flex; width:100%;">
        <div id="sidebar">
            <div style="background:var(--primary); padding:15px; color:white; display:flex; justify-content:space-between; align-items:center;">
                <img id="my-avatar" style="width:40px; height:40px; border-radius:50%; border:2px solid white;">
                <span id="my-name" style="font-weight:bold;"></span>
                <button onclick="logout()" style="background:none; border:none; color:white; cursor:pointer;">יציאה</button>
            </div>

            <div class="filter-bar">
                <button class="filter-btn active">הכל</button>
                <button class="filter-btn">לא נקראו <span>24</span></button>
                <button class="filter-btn">מועדפים</button>
                <button class="filter-btn">קבוצות <span>22</span></button>
                <button class="filter-btn">+</button>
            </div>

            <div id="chats-list" style="flex:1; overflow-y:auto; padding:10px;">
                <div style="text-align:center; color:#888; margin-top:20px;">אין שיחות פעילות</div>
            </div>
        </div>

        <div id="chat-area">
            <div style="margin:auto; text-align:center; color:#888;">
                <img src="https://img.uniquemu.co.il/upload2/35gwzs3j/9e00732bba4442cec056fb05ac6dfcea-png.png" width="80" style="opacity:0.3; filter:grayscale(1);">
                <p>בחר צ'אט כדי להתחיל</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDunrG_booopCpxqpcGEhbqr5n-HY7glHU",
            authDomain: "velora-617fa.firebaseapp.com",
            projectId: "velora-617fa",
            storageBucket: "velora-617fa.firebasestorage.app",
            messagingSenderId: "299931306828",
            appId: "1:299931306828:web:ca3c2533144fba6de49de9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // פונקציית התחברות ללא פופ-אפ
        document.getElementById('loginBtn').onclick = () => {
            document.getElementById('login-loader').classList.remove('hidden');
            // אנחנו מבקשים רק פרופיל ואימייל כדי למנוע את האזהרה המפחידה של "גישה לכל החשבון"
            signInWithRedirect(auth, provider);
        };

        // בדיקה אם חזרנו מהפניה של גוגל
        getRedirectResult(auth).catch((error) => {
            console.error("Redirect error:", error);
            alert("שגיאה בחיבור: " + error.message);
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // בדיקה ב-Firestore ועדכון פרופיל
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        name: user.displayName,
                        email: user.email,
                        photoURL: user.photoURL,
                        status: "active",
                        role: user.email === "rplzky7@gmail.com" ? "admin" : "user"
                    });
                }

                showApp(user);
            } else {
                showLogin();
            }
        });

        function showApp(user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('my-avatar').src = user.photoURL || 'https://via.placeholder.com/40';
            document.getElementById('my-name').innerText = user.displayName;
            
            if (user.email !== "rplzky7@gmail.com") {
                document.getElementById('app-body').classList.add('user-restricted');
            }
        }

        function showLogin() {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }

        window.logout = () => signOut(auth);

    </script>
</body>
</html>
