<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Velora Ultra - Official</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --b: #4da3ff; --bg: #0a0c10; --c: #161b22; --t: #e6edf3; --g: #8b949e; --r: #ff4d4d; --gold: #f1c40f; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--t); height: 100dvh; overflow: hidden; }

        /* מסך התחברות - בדיוק לפי הצילום מסך */
        #auth-page { 
            height: 100dvh; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; background: #0a0c10; text-align: center; padding: 20px; 
        }
        .velora-title { font-size: 75px; font-weight: 800; color: var(--b); letter-spacing: -4px; margin-bottom: 5px; }
        .sub-text { font-size: 14px; color: var(--g); letter-spacing: 2px; margin-bottom: 60px; font-weight: 300; }
        
        .login-btn { 
            background: white; color: black; border: none; padding: 16px 30px; border-radius: 50px; 
            font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; 
            gap: 12px; width: 100%; max-width: 300px; justify-content: center; transition: 0.2s;
        }
        .login-btn:active { transform: scale(0.96); }
        .google-icon { width: 24px; height: 24px; }
        
        .rafael-link { margin-top: 60px; color: var(--b); text-decoration: none; font-size: 14px; transition: 0.3s; }

        /* ממשק אפליקציה */
        #app-page { display: none; flex-direction: column; height: 100%; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #0d1117; border-bottom: 1px solid #333; }
        .main { flex: 1; overflow-y: auto; background: #010409; }
        
        .stories { display: flex; gap: 15px; padding: 15px; overflow-x: auto; border-bottom: 1px solid #222; }
        .story-add { min-width: 65px; height: 65px; border-radius: 50%; border: 2px dashed #444; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #444; }

        .nav { height: 75px; background: var(--c); display: flex; border-top: 1px solid #333; padding-bottom: env(safe-area-inset-bottom); }
        .nav-i { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--g); font-size: 11px; }
        .nav-i.active { color: var(--b); }

        /* פאנל ניהול */
        #admin-panel { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; padding: 20px; }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="velora-title">VELORA</div>
        <div class="sub-text">RAFAEL DIGITAL PLATFORM</div>
        
        <button class="login-btn" onclick="login()">
            <span id="btn-text">כניסה עם Google</span>
            <svg class="google-icon" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
        </button>

        <a href="https://did.li/Rafael-Digital-office" class="rafael-link">נוצר על ידי רפאל דיגיטל</a>
    </div>

    <div id="app-page">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <div id="u-img" style="width:35px; height:35px; border-radius:50%; background:#333; overflow:hidden;"></div>
                <h3 id="u-name" style="font-size:16px;">Velora</h3>
            </div>
            <div style="display:flex; gap:15px;">
                <span id="adm-key" onclick="openAdmin()" style="display:none; cursor:pointer;">⚙️</span>
                <span id="crown" style="display:none; color:var(--gold);">👑</span>
                <span onclick="logout()" style="color:var(--r); cursor:pointer;">🚪</span>
            </div>
        </header>
        
        <div class="stories">
            <div class="story-add">+</div>
        </div>

        <main class="main" id="chats">
            <p style="text-align:center; padding:40px; color:var(--g);">טוען נתונים מאובטחים...</p>
        </main>

        <nav class="nav">
            <div class="nav-i active"><span>💬</span>שיחות</div>
            <div class="nav-i"><span>⭕</span>סטטוסים</div>
            <div class="nav-i"><span>👤</span>פרופיל</div>
        </nav>
    </div>

    <div id="admin-panel">
        <h2 style="margin-bottom:20px;">ניהול רפאל דיגיטל</h2>
        <input type="text" id="alert-txt" placeholder="הודעה לכל המשתמשים..." style="width:100%; padding:15px; border-radius:10px; background:#222; border:1px solid #444; color:white;">
        <button onclick="sendAlert()" style="margin-top:20px; background:var(--b); padding:15px; border-radius:10px; width:100%; border:none; font-weight:bold;">שלח התראה</button>
        <button onclick="closeAdmin()" style="margin-top:10px; background:none; border:none; color:var(--g); width:100%;">חזור</button>
    </div>

    <script>
        // הכנס כאן את ה-Config שלך
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER",
            appId: "YOUR_APP"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // זיהוי שפה
        if (!navigator.language.startsWith('he')) {
            document.getElementById('btn-text').innerText = "Sign in with Google";
        }

        // לוגיקת התחברות
        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.addScope('https://www.googleapis.com/auth/contacts.readonly');
            
            auth.signInWithPopup(provider).then(res => {
                sessionStorage.setItem('token', res.credential.accessToken);
                start(res.user);
            }).catch(e => alert("שגיאה בהתחברות. בדוק הגדרות Firebase."));
        }

        function start(user) {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('app-page').style.display = 'flex';
            document.getElementById('u-name').innerText = user.displayName;
            document.getElementById('u-img').innerHTML = `<img src="${user.photoURL}" width="100%">`;

            // בדיקת מנהל
            if (user.email === 'rplzky7@gmail.com') {
                document.getElementById('adm-key').style.display = 'block';
                document.getElementById('crown').style.display = 'block';
            }
            
            // בקשת התראות
            Notification.requestPermission();
        }

        function openAdmin() { document.getElementById('admin-panel').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        
        function sendAlert() {
            const msg = document.getElementById('alert-txt').value;
            if(msg) {
                alert("התראה נשלחה: " + msg);
                closeAdmin();
            }
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        // בדיקה אם המשתמש כבר מחובר
        auth.onAuthStateChanged(user => { if(user) start(user); });

        // רישום PWA (התקנה)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }

        window.oncontextmenu = e => e.preventDefault();
    </script>
</body>
</html>
