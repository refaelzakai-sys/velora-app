<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Velora">
    <link rel="manifest" href="data:application/manifest+json,{'name':'Velora','short_name':'Velora','start_url':'.','display':'standalone','background_color':'#0a0c10','theme_color':'#4da3ff'}">

    <title>Velora</title>

    <style>
        :root { 
            --v-blue: #4da3ff; --v-bg: #0a0c10; --v-card: #161b22; 
            --v-text: #e6edf3; --v-gray: #8b949e; --v-red: #ff4d4d; --v-green: #2ecc71;
            --v-purple: #a371f7; --v-gold: #f1c40f; --v-dark-gray: #0d1117;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; outline: none; }
        body, html { height: 100dvh; margin: 0; background: var(--v-bg); color: var(--v-text); overflow: hidden; user-select: none; }
        
        /* Layout Structure */
        .app-shell { display: flex; flex-direction: column; height: 100dvh; position: relative; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); background: var(--v-dark-gray); z-index: 100; }
        
        /* Stories Rail */
        .stories-rail { display: flex; gap: 15px; padding: 15px; overflow-x: auto; background: var(--v-dark-gray); border-bottom: 1px solid rgba(255,255,255,0.05); scrollbar-width: none; }
        .stories-rail::-webkit-scrollbar { display: none; }
        .story-circle { min-width: 68px; height: 68px; border-radius: 50%; border: 2px solid var(--v-blue); padding: 3px; position: relative; cursor: pointer; transition: 0.3s; }
        .story-circle:active { transform: scale(0.9); }
        .story-circle .inner { width: 100%; height: 100%; border-radius: 50%; background: var(--v-card); display: flex; align-items: center; justify-content: center; font-weight: bold; overflow: hidden; }

        /* Main View */
        .view-content { flex: 1; overflow-y: auto; position: relative; }
        .chat-list { display: flex; flex-direction: column; }
        .chat-item { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; transition: 0.2s; position: relative; }
        .chat-item:active { background: rgba(255,255,255,0.05); }
        .chat-avatar { width: 54px; height: 54px; border-radius: 50%; background: var(--v-card); margin-left: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        .online-dot { width: 12px; height: 12px; background: var(--v-green); border: 2px solid var(--v-bg); border-radius: 50%; position: absolute; bottom: 2px; left: 2px; }

        /* Badges & Indicators */
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; margin-right: 5px; }
        .badge-once { background: var(--v-purple); color: white; }
        .badge-timer { background: rgba(255, 77, 77, 0.15); color: var(--v-red); border: 1px solid var(--v-red); }

        /* Navigation */
        .v-nav { height: 75px; background: var(--v-card); display: flex; border-top: 1px solid rgba(255,255,255,0.1); padding-bottom: env(safe-area-inset-bottom); }
        .v-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--v-gray); font-size: 11px; cursor: pointer; transition: 0.2s; }
        .v-nav-item i { font-size: 22px; margin-bottom: 4px; }
        .v-nav-item.active { color: var(--v-blue); }

        /* Modern Modals */
        .v-modal { position: fixed; inset: 0; background: var(--v-bg); z-index: 2000; transform: translateY(100%); transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1); padding: 0; display: flex; flex-direction: column; }
        .v-modal.open { transform: translateY(0); }
        .modal-header { padding: 20px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal-body { flex: 1; overflow-y: auto; padding: 25px; }

        /* PIN Pad UI */
        .pin-screen { text-align: center; justify-content: center; }
        .pin-dots { display: flex; justify-content: center; gap: 20px; margin: 40px 0; }
        .dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--v-blue); transition: 0.2s; }
        .dot.filled { background: var(--v-blue); transform: scale(1.2); }
        .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 300px; margin: 0 auto; }
        .pin-key { background: var(--v-card); border: none; color: white; border-radius: 50%; width: 70px; height: 70px; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .pin-key:active { background: var(--v-blue); color: black; }

        /* Buttons */
        .v-btn { background: var(--v-blue); color: black; border: none; padding: 16px; border-radius: 16px; font-weight: 800; width: 100%; cursor: pointer; margin: 10px 0; font-size: 16px; }
        .v-btn-sec { background: var(--v-card); color: white; }

        /* Admin Panel Items */
        .admin-card { background: var(--v-card); border-radius: 18px; padding: 20px; margin-bottom: 15px; border-right: 4px solid var(--v-purple); }
        .report-item { font-size: 13px; color: var(--v-gray); padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="app-shell">
        <header id="main-header">
            <h2 id="view-title">Velora</h2>
            <div style="display:flex; gap:18px; align-items:center;">
                <span id="lock-status" style="cursor:pointer; font-size:20px;" onclick="handleHiddenAccess()">🔒</span>
                <span id="admin-crown" style="display:none; color:var(--v-gold); font-size:24px; cursor:pointer;" onclick="openAdminPortal()">👑</span>
            </div>
        </header>

        <div class="stories-rail" id="stories-section">
            <div class="story-circle" onclick="addStory()">
                <div class="inner" style="color:var(--v-blue); font-size:24px;">+</div>
            </div>
        </div>

        <main class="view-content" id="app-viewport">
            </main>

        <nav class="v-nav">
            <div class="v-nav-item active" id="tab-chats" onclick="switchTab('chats')">
                <i>💬</i><span>שיחות</span>
            </div>
            <div class="v-nav-item" id="tab-me" onclick="switchTab('me')">
                <i>👤</i><span>פרופיל</span>
            </div>
        </nav>
    </div>

    <div id="hidden-modal" class="v-modal">
        <div class="modal-body pin-screen">
            <h2 style="font-size:28px;">שיחות חסויות</h2>
            <p style="color:var(--v-gray)">הזן את קוד הגישה האישי שלך</p>
            <div class="pin-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="pin-grid">
                <button class="pin-key" onclick="pressPin('1')">1</button>
                <button class="pin-key" onclick="pressPin('2')">2</button>
                <button class="pin-key" onclick="pressPin('3')">3</button>
                <button class="pin-key" onclick="pressPin('4')">4</button>
                <button class="pin-key" onclick="pressPin('5')">5</button>
                <button class="pin-key" onclick="pressPin('6')">6</button>
                <button class="pin-key" onclick="pressPin('7')">7</button>
                <button class="pin-key" onclick="pressPin('8')">8</button>
                <button class="pin-key" onclick="pressPin('9')">9</button>
                <button class="pin-key" style="background:none" onclick="biometricAuth()">👆</button>
                <button class="pin-key" onclick="pressPin('0')">0</button>
                <button class="pin-key" style="background:none; color:var(--v-red)" onclick="closeModals()">✕</button>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="v-modal">
        <div class="modal-header">
            <button onclick="closeModals()" style="background:none; border:none; color:var(--v-blue); font-size:24px;">✕</button>
            <h3 style="flex:1; text-align:center; margin-right:-30px;">פאנל ניהול רפאל</h3>
        </div>
        <div class="modal-body">
            <div class="admin-card">
                <h4>ניטור מדיה חד-פעמית</h4>
                <div id="once-logs">אין תעבורה חדשה לניטור.</div>
            </div>
            <div class="admin-card" style="border-right-color: var(--v-red);">
                <h4>דיווחים פתוחים</h4>
                <div id="report-logs">אין דיווחים ממשתמשים.</div>
            </div>
        </div>
    </div>

    <script>
        // האובייקט המרכזי שמנהל את הכל
        const Velora = {
            user: { email: "", isAdmin: false, pin: "1234", bioEnabled: true },
            state: { currentTab: 'chats', isHiddenUnlocked: false, pinBuffer: "" },
            
            // נתונים (שישמרו בהמשך ב-Local Storage או DB)
            chats: [],
            reports: [],
            onceMedia: [],

            init() {
                // בדיקת התקנה
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('/sw.js').catch(()=>{});
                }
                this.renderLogin();
            },

            // --- מערכת כניסה ---
            renderLogin() {
                const viewport = document.getElementById('app-viewport');
                document.getElementById('stories-section').style.display = 'none';
                document.querySelector('.v-nav').style.display = 'none';
                document.getElementById('main-header').style.display = 'none';

                viewport.innerHTML = `
                    <div style="height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:40px; text-align:center;">
                        <h1 style="font-size:60px; color:var(--v-blue); margin:0;">Velora</h1>
                        <p style="color:var(--v-gray); margin-bottom:50px; font-size:18px;">Fast. Private. Secure.</p>
                        <div style="width:100%; max-width:320px;">
                            <input type="email" id="u-mail" placeholder="אימייל" style="width:100%; padding:18px; border-radius:18px; border:1px solid #333; background:var(--v-card); color:white; margin-bottom:15px; text-align:center; font-size:16px;">
                            <button onclick="Velora.handleAuth()" class="v-btn">התחברות</button>
                        </div>
                    </div>
                `;
            },

            handleAuth() {
                const email = document.getElementById('u-mail').value.trim();
                if(!email) return;

                this.user.email = email;
                this.user.isAdmin = (email === 'rplzky7@gmail.com');
                
                // הצגת הממשק
                document.querySelector('.v-nav').style.display = 'flex';
                document.getElementById('main-header').style.display = 'flex';
                if(this.user.isAdmin) document.getElementById('admin-crown').style.display = 'block';
                
                this.switchTab('chats');
            },

            // --- ניווט וטאבים ---
            switchTab(tab) {
                this.state.currentTab = tab;
                this.state.isHiddenUnlocked = false; // נעילה אוטומטית במעבר
                
                document.querySelectorAll('.v-nav-item').forEach(el => el.classList.remove('active'));
                document.getElementById('tab-' + tab).classList.add('active');
                
                const viewport = document.getElementById('app-viewport');
                const stories = document.getElementById('stories-section');
                
                if(tab === 'chats') {
                    stories.style.display = 'flex';
                    document.getElementById('view-title').innerText = "שיחות";
                    this.renderChats();
                } else {
                    stories.style.display = 'none';
                    document.getElementById('view-title').innerText = "פרופיל";
                    this.renderProfile();
                }
            },

            // --- תצוגת שיחות ---
            renderChats() {
                const viewport = document.getElementById('app-viewport');
                const list = this.chats.filter(c => this.state.isHiddenUnlocked ? c.isHidden : !c.isHidden);

                if(list.length === 0) {
                    viewport.innerHTML = `
                        <div style="padding:100px 20px; text-align:center; color:var(--v-gray);">
                            <div style="font-size:50px; opacity:0.3; margin-bottom:20px;">✉️</div>
                            <p>אין שיחות עדיין.<br>שלח הודעה למשתמש אחר כדי להתחיל.</p>
                            <button class="v-btn" style="width:auto; padding:12px 30px; margin-top:20px; font-size:14px;" onclick="Velora.newChat()">שיחה חדשה</button>
                        </div>
                    `;
                    return;
                }
                // כאן יתבצע רינדור הרשימה (יתווסף בחלק ב')
            },

            renderProfile() {
                const viewport = document.getElementById('app-viewport');
                viewport.innerHTML = `
                    <div style="padding:40px; text-align:center;">
                        <div style="width:100px; height:100px; background:var(--v-card); border-radius:50%; margin:0 auto 20px; border:3px solid var(--v-blue); display:flex; align-items:center; justify-content:center; font-size:40px;">👤</div>
                        <h2 style="margin:0;">${this.user.email.split('@')[0]}</h2>
                        <p style="color:var(--v-gray); font-size:14px;">${this.user.email}</p>
                        
                        <div style="margin-top:50px; text-align:right;">
                            <div style="background:var(--v-card); padding:15px; border-radius:15px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                                <span>🔒 שיחות חסויות (PIN)</span>
                                <span style="color:var(--v-blue)">פעיל</span>
                            </div>
                            <div style="background:var(--v-card); padding:15px; border-radius:15px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                                <span>👆 ביומטריה</span>
                                <span style="color:var(--v-green)">מופעל</span>
                            </div>
                        </div>

                        <button class="v-btn v-btn-sec" style="margin-top:40px; color:var(--v-red);" onclick="location.reload()">התנתקות</button>
                    </div>
                `;
            }
        };

        // פונקציות גלובליות לשליטה מה-UI
        function openAdminPortal() { document.getElementById('admin-modal').classList.add('open'); }
        function closeModals() { document.querySelectorAll('.v-modal').forEach(m => m.classList.remove('open')); }
        
        // אתחול האפליקציה
        window.onload = () => Velora.init();
    </script>
</body>
</html>
