            display: none; 
            margin-top: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- מסך האפליקציה (עיצוב תואם בול לתמונה ששלחת) --- */

<body>

    <div id="login-screen">
        <div class="v-logo">VELORA</div>
        <button id="login-btn" class="g-btn">Continue with Google</button>
        <div id="login-loader" class="loader"></div>
        <a id="credit-text" href="https://did.li/Rafael-Digital-office" class="credit-link"></a>
    </div>

    <div id="app">
        <h2 id="u-name" class="welcome-title"></h2>
        <p class="welcome-subtitle">.Welcome to the secure experience</p>
        <button onclick="logout()" class="logout-link">Logout</button>
    </div>

    <script>
        // חיבור למסד הנתונים האמיתי של Velora
        const firebaseConfig = {
            apiKey: "AIzaSyDunrG_booopCpxqpcGEhbqr5n-HY7glHU",
            authDomain: "velora-617fa.firebaseapp.com",
            databaseURL: "https://velora-617fa-default-rtdb.firebaseio.com",
            projectId: "velora-617fa",
            storageBucket: "velora-617fa.firebasestorage.app",
            messagingSenderId: "299931306828",
            appId: "1:299931306828:web:ca3c2533144fba6de49de9",
            measurementId: "G-ZC5E26QR9K"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // הגדרות שפה וקרדיטים
        const userLang = navigator.language.startsWith('he') ? 'he' : 'en';
        const i18n = {
            he: { credit: "נוצר באהבה על ידי: רפאל דיגיטל", btn: "המשך עם Google" },
            en: { credit: "Created with love by: Rafael Digital", btn: "Continue with Google" }
        };
        
        document.getElementById('credit-text').innerText = i18n[userLang].credit;
        document.getElementById('login-btn').innerText = i18n[userLang].btn;

        const loginBtn = document.getElementById('login-btn');
        const loginLoader = document.getElementById('login-loader');
        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app');
        const uNameLabel = document.getElementById('u-name');

        // פעולת התחברות - שימוש ב-Popup למניעת לופ ושגיאות שראינו בתמונה
        loginBtn.addEventListener('click', () => {
            loginBtn.style.display = 'none';
            loginLoader.style.display = 'block';
            
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });

            auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => {
                return auth.signInWithPopup(provider);
            }).then((result) => {
                handleUserApp(result.user);
            }).catch((error) => {
                console.error("Login Error:", error);
                loginBtn.style.display = 'flex';
                loginLoader.style.display = 'none';
                if(error.code !== 'auth/popup-closed-by-user') {
                    alert("שגיאת התחברות: " + error.message);
                }
            });
        });

        // האזנה למצב המשתמש - טוען ישירות לאפליקציה אם כבר מחובר
        auth.onAuthStateChanged((user) => {
            if (user) {
                handleUserApp(user);
            } else {
                loginScreen.style.display = 'flex';
                appScreen.style.display = 'none';
                loginBtn.style.display = 'flex';
                loginLoader.style.display = 'none';
            }
        });

        function handleUserApp(user) {
            // שמירה למסד הנתונים האמיתי (לא דמה) כדי שמשתמשים יופיעו במערכת
            db.ref('users/' + user.uid).update({
                uid: user.uid,
                name: user.displayName,
                email: user.email,
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            });

            // עדכון הממשק - תואם לתמונה "ברוך הבא, רפאל זכאי"
            uNameLabel.innerText = "ברוך הבא, " + user.displayName;
            
            // הצגת האפליקציה
            loginScreen.style.display = 'none';
            appScreen.style.display = 'flex';
        }

        // התנתקות
        window.logout = () => {
            auth.signOut().then(() => {
                location.reload();
            });
        };
    </script>
