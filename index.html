<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velora | Rafael Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- הנתונים מהתמונה שלך ---
        const firebaseConfig = {
            apiKey: "AIzaSyDunrG_booopCpxqpcGEhbqrSn-HY7glHU",
            authDomain: "velora-617fa.firebaseapp.com",
            projectId: "velora-617fa",
            storageBucket: "velora-617fa.firebasestorage.app",
            messagingSenderId: "299931306828",
            appId: "1:299931306828:web:ca3c2533144fba6de49de9",
            measurementId: "G-ZCSE26QR9K"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const adminEmail = "rplzky7@gmail.com";

        let currentUserData = null;

        window.login = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                checkUser(result.user);
            } catch (e) { alert("שגיאה בהתחברות"); }
        };

        async function checkUser(user) {
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            
            if (snap.exists() && snap.data().blocked) {
                alert("נחסמת על ידי המנהל.");
                signOut(auth);
                return;
            }

            if (!snap.exists()) {
                const internalId = Math.floor(1000000000 + Math.random() * 9000000000);
                currentUserData = {
                    name: user.displayName,
                    email: user.email,
                    internalId: internalId,
                    token: btoa(user.uid).substring(0, 12),
                    blocked: false
                };
                await setDoc(userRef, currentUserData);
            } else {
                currentUserData = snap.data();
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('user-id-display').innerText = currentUserData.internalId;
            if (user.email === adminEmail) document.getElementById('admin-badge').classList.remove('hidden');
            listenToMessages();
        }

        function listenToMessages() {
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('chat-container');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `mb-4 p-3 rounded-2xl max-w-[80%] ${msg.email === auth.currentUser.email ? 'bg-blue-600 mr-auto rounded-br-none' : 'bg-gray-800 ml-auto rounded-bl-none'}`;
                    
                    if (msg.type === 'text') {
                        msgDiv.innerHTML = `<p class="text-sm">${msg.content}</p>`;
                    } else if (msg.type === 'image') {
                        msgDiv.innerHTML = `<img src="${msg.url}" class="rounded-lg w-full">`;
                    } else if (msg.type === 'video') {
                        msgDiv.innerHTML = `<video src="${msg.url}" controls class="rounded-lg w-full"></video>`;
                    } else if (msg.type === 'audio') {
                        msgDiv.innerHTML = `<audio src="${msg.url}" controls class="w-full h-8"></audio>`;
                    } else {
                        msgDiv.innerHTML = `<a href="${msg.url}" target="_blank" class="text-blue-200 underline text-xs">📁 הורד קובץ</a>`;
                    }
                    container.appendChild(msgDiv);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const input = document.getElementById('msg-input');
            if (!input.value) return;
            await addDoc(collection(db, "messages"), {
                email: auth.currentUser.email,
                content: input.value,
                type: 'text',
                timestamp: serverTimestamp()
            });
            input.value = "";
        };

        window.uploadMedia = async (file) => {
            const cloudName = "drvjp5mer";
            const uploadPreset = "mediaflows_0fe2e516"; 
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', uploadPreset);

            document.getElementById('upload-status').innerText = "מעלה למערכת...";

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                
                let type = 'raw';
                if (file.type.includes('image')) type = 'image';
                else if (file.type.includes('video')) type = 'video';
                else if (file.type.includes('audio')) type = 'audio';

                await addDoc(collection(db, "messages"), {
                    email: auth.currentUser.email,
                    url: data.secure_url,
                    type: type,
                    timestamp: serverTimestamp()
                });
                document.getElementById('upload-status').innerText = "";
            } catch (e) { alert("שגיאה בהעלאה"); }
        };

        onAuthStateChanged(auth, u => { if(u) checkUser(u); });
    </script>
</head>
<body class="bg-black text-white h-[100dvh] flex flex-col overflow-hidden font-sans">

    <div id="login-screen" class="flex-1 flex flex-col items-center justify-center bg-gradient-to-b from-gray-900 to-black">
        <h1 class="text-6xl font-black text-blue-500 mb-2 italic tracking-tighter">VELORA</h1>
        <p class="text-gray-400 mb-12 tracking-widest text-xs uppercase">Rafael Digital Platform</p>
        <button onclick="login()" class="bg-white text-black px-10 py-4 rounded-full font-bold flex items-center gap-3 shadow-lg shadow-blue-500/20 active:scale-95 transition">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-6">
            כניסה עם Google
        </button>
    </div>

    <div id="app-screen" class="hidden flex-1 flex flex-col overflow-hidden">
        <header class="p-4 bg-gray-900/50 backdrop-blur-md border-b border-gray-800 flex justify-between items-center">
            <div>
                <h2 class="font-bold text-blue-400 leading-none">Velora</h2>
                <p class="text-[10px] text-gray-500 mt-1">ID: <span id="user-id-display"></span> <span id="admin-badge" class="hidden text-red-500 font-bold">| ADMIN</span></p>
            </div>
            <button onclick="signOut(getAuth())" class="text-[10px] bg-gray-800 px-3 py-1 rounded-full text-gray-400">התנתק</button>
        </header>

        <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-3 bg-black">
            </main>

        <div id="upload-status" class="text-center text-[10px] text-blue-400 italic py-1"></div>

        <footer class="p-3 bg-gray-900 border-t border-gray-800 flex gap-2 items-center">
            <label class="cursor-pointer bg-gray-800 hover:bg-gray-700 p-2 rounded-full w-12 h-12 flex items-center justify-center transition">
                <span class="text-xl">📎</span>
                <input type="file" class="hidden" onchange="uploadMedia(this.files[0])">
            </label>
            <input type="text" id="msg-input" placeholder="הקלד הודעה..." class="flex-1 bg-gray-800 rounded-full px-5 py-3 outline-none border border-gray-700 focus:border-blue-500 transition">
            <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-500 p-2 rounded-full w-12 h-12 flex items-center justify-center transition shadow-lg shadow-blue-600/30">
                🚀
            </button>
        </footer>
    </div>

</body>
</html>
